body:
  text: 大宋國傳賢首祖教沙門淨源撰集二諦品第四初來意者謂前觀如來及菩薩行二品大意自他兼濟悲智雙修而初心菩薩有智無悲則多趣寂有悲無智則成愛見今以真諦絕於愛見俗諦導乎趣寂故次來也又約當品雙資因果而成下文護果護因故次來也次釋名二者數也諦審實也真諦顯理修證俱亡俗諦明事因果歷然即俗而真如鏡影即空即真而俗如空不壞影真俗不二唯一中道如鏡中之明若依相宗真俗二諦條然不同非斷非常果生因滅非此所尚耳三解經五初匿王致問爾時波斯匿王白佛言世尊勝義諦中有世俗諦不先開雙關次牒之而難若言無者智不應二若無俗諦則智不能照真俗之二若言有者智不應一若有俗諦則智不能觀中道之一一二之義其事云何雙結前義敢問如何二如來正答三初實相明真俗境二先長行略示二初敘昔示義佛言大王汝於過去龍光王佛法中已問此義過去已問獨善一身自利也今復請益兼濟大眾利他也我今無說汝今無聽無說無聽是即名為一義二義說聽俱泯真諦唯一師資並存俗諦具二故華嚴序云無說無示理符不二之門因言顯言方闡大千之義二勅聽許說汝今諦聽當為汝說誡令審諦勿雜餘緣故智度論云聽者端視如渴飲一心入於語義中踊躍聞法心悲喜如是之人可為說然此經文對前亦互望明其一二之義謂前文敘昔示義即說聽俱泯顯真諦之一也今此勅聽許說顯師資並存即俗諦之二也二偈頌廣答於中九頌初有一偈真俗絕待次有七偈二諦互陳後有一偈雙結真俗文三今初真俗絕待爾時世尊即說偈言集經者敘無相勝義諦體非自他作真諦無相體絕對待不從緣生非自作也不逐境起非他作也故肇論云真諦自無相真智何由知因緣如幻有亦非自他作俗諦幻有因緣即空亦絕自他故中論云因緣所生法我說即是空二二諦互陳三初約假明二諦法性本無性勝義諦空如隨緣法性本無實性唯依勝義不變空如上半偈約隨緣不變下半偈約體空成事諸有幻有法三假集假有俗諦諸有幻有體空法受名集成事假有二約空明二諦三初法無無諦實無寂滅勝義空真諦自無非推之使無故云諦實無也寂滅勝義即真空也諸法因緣有有無義如是俗諦諸法緣會即有緣離即無故云有無義如是也二喻有無本自二譬如牛二角緣生而有緣滅而無一生一滅本自二也故取分喻牛二角焉照解見無二二諦常不即上句即照而遮故無二諦也下句即遮而照故常不即也三合解心見無二求二不可得合法中上半偈非謂二諦一一亦不可得合法中下半偈三雙遣明中道初法於解常自一於諦常自二上句明中道常一即遣二也上句顯真俗常二即遣一也故古德云二諦並非雙恒乖未曾各若泥於文殊非得意了達此一二真入勝義諦了達中道惟一俗諦具二即入勝義諦也古德又云一雙孤鴈略地高飛一對鴛鴦池邊獨立二喻二初喻真俗世諦幻化起譬如虗空華虗空喻真諦華喻俗諦故楞嚴云譬如虗空體非羣相而不拒彼諸相發揮如影如毛輪因緣故幻有託鏡起者見現影眼有翳者見毛輪皆喻俗諦因緣幻有矣二喻迷悟幻化見幻化愚夫名幻諦不了幻化空凡夫迷於俗幻師見幻法諦幻悉皆無了見諦幻無聖人悟於真三雙結真俗若了如是法即解一二義如是法即玅明真心遍於一切法應作如是觀謂真諦俗諦雖通別有殊皆遍攝一切法如是觀者真俗不二唯一玅源也二觀照辨權實智二初總標大王菩薩摩訶薩住勝義諦化諸有情以實智證真住勝義諦以權智達俗化諸有情二別釋於中分四初能所不二次惑智不二三絕待不二四因果不二然能所不二中通能度所度能求所求謂佛是能度人有情是所度法又有情是能求人菩提是所求法既知人法兩重次下略釋經文初能所不二分之為三初能度所度佛及有情一而無二楚音佛陀此翻覺者即能度也有情即所度也二能求所求二初略徵釋何以故徵意謂佛與有情迷悟逈殊何故無二耶次釋云有情菩提此二皆空能求有情所求菩提此二皆即真空也故大品云諸法若不空即無道無果釋曰道即因也謂諸法若不得真空即無有情之因無菩提之果耳二互釋以有情空得置菩提空以菩提空得置有情空置猶同也先以能求人同所求法空後以所求法同能求人空故志公云以我身空諸法空千品萬類悉皆同次遣能空智以一切法空空故空由所空一切法空故能空之智亦空三徵釋所以何以故以何義故能空之智亦空耶般若無相二諦皆空以能證般若無相由所證二諦皆空也莊周亦云因有而有之因無而無之可以例釋二惑智不二謂從無明至一切智無自相無他相由從無明惑因至玅覺智果無能斷自相之智無所斷他相之惑也三絕待不二於第一義見無所見第一義諦絕諸對待能見之智所見之境皆空也若有修行亦不取著若不修行亦不取著隨相有修離相無修隨相離相皆絕受著非行非不行亦不取著非行即真諦非不行即俗諦若真若俗皆不受著於一切法皆不取著總結謂若凡聖若依正並由對待皆不受著也四因果不二菩薩未成佛以菩提為煩惱菩薩成佛時以煩惱為菩提未成約因迷智為惑已成約果悟惑即智何以故於第一義而無二故迷悟雙泯諸佛如來與一切法悉皆如故諸佛證第一義未有不如如者故淨名云一切法皆如也至於彌勒亦如也三文字顯上二義三初匿王致問波斯匿王白佛言十方諸佛一切菩薩望果標因諸佛已修菩薩現修云何不離文字而行實相問意謂佛及菩薩云何不離文字般若而修諸行證實相耶二如來正答圭峯祖師謂實相觀照不一不二以為其宗文字性空即是般若以為其體今準茲宗體科釋經旨文二初文字性空即實相二初文字性空佛言大王文字者十二分經皆文字各有二相如注配謂契經一總相涅槃云始從如是我聞終至歡喜奉行皆修多羅二別相雜集云謂長行綴緝略說所應說義又有異名謂法本直說聖教或但名經應頌一與長行相應之頌由長行說未盡故二為後來應更頌故記別一記弟子生死因果二記菩薩當成佛事諷頌謂孤起偈一為易誦持故二為樂偈者故自說一為令知而請法故二為令所化生殷重故念佛慈悲為不請友緣起因緣生起一因請方說為重法故二因事方說知本末故譬喻一為深智說以令解真故二為淺識就彼取類誘令信故本事一說佛往事二說弟子往事本生說昔受身一說如來二說餘者方廣一廣大利樂二廣陳正說希有一德業殊異故二法體希奇故論議一以理深故論二以義不了故論並循環研覈或佛自論或菩薩相論二教體實相二初正明所有宣說音聲語言宮商等音語路言詞是謂佛教聲即所依也文字章句名句文三能依也名詮自性句詮差別文即是字章明也一切皆如無非實相實相無名無名相中假名相說豈不皆如哉二揀非若取文字相者即非實相假言顯義不應如言執義故云若取文字即非實相也然不執即為不取非全棄也二文字性空即觀照二初躡前起後大王修實相者如文字修實相即是諸佛智母諸佛以實相根本為智母一切有情根本智母有情亦以根本為母上明根本觀照下明後得觀照此即名為一切智體以根本智體起後得智用二修證觀照二初明諸佛成護果二初正明佛界諸佛未成佛與當佛為智母上句標果修因下句修因克果能生當果故名智母諸佛已成佛即為一切智既為當佛智母即已成佛能生後得即為一切智次二句結前未得為性未得成佛為實相真性已得為智已得成佛為觀照玅智二兼示九界三乘般若不生不滅自性常性般若即能證智不生滅即所證理自性即法性也故宗本義云三乘等觀法性而得道但心有大小為異耳上明三乘下示六趣一切有情此為覺性覺性即佛性也所以論云在有情數中名為佛性二顯菩薩成護因二初示教道三賢緣修若菩薩不著文字不離文字著文字而喪真離文字而倒惑無文字相覆疎不著文字非無文字覆疎不離文字此同起信依言真如生信境二明證道十聖真修能如是修不見修相是即名為修文字者能如是修牒前教道緣修不見修相明其證道真修而能得於般若真性是為般若波羅蜜多以觀照般若證實相真性此同起信離言真如觀智境三結成二護大王菩薩摩訶薩護佛果護十地行護化有情為若此也觀如來品護果既化有情菩薩行品護因亦化有情今此二諦品雙資因果故總結云護化有情為如是也三躡前請益二初匿王申問波斯匿王白佛言真性是一有情品類根行無量法門為一為無量耶問意謂所證真性是一護化有情品類根行無量其所被法門與真性一耶同品類無量耶二如來總答三初正答佛言大王法門非一亦非無量所說法門若謂是一隨類各解非同真性一也若謂無量一音所演非同有情無量也二徵釋二初徵何以故何故非一非無量耶二釋二初約根相異性一由諸有情色法心法五取蘊相合色為一開心為四妄取蘊相我人知見種種根行品類無邊妄知妄見根器不等行跡不同品類無邊法門隨根亦有無量所被法門隨其根器逐其行跡亦具無量上明相異下示性一此諸法性非相非無相而非無量諸之也法性唯一非有相非無相亦非無量相二約諦真一俗二初揀非若菩薩隨諸有情見一見二若菩薩隨逐凡情以分別見真諦唯一俗諦具二者是即不見一二之義不見中道俗不違真之一真不違俗之二二顯是了知一二非一非二即勝義諦了知一是真諦之一二是俗諦之二非真非俗即中道勝義也取著一二若有若無即世俗諦反顯取一著真取二著俗以有無二法即是俗諦亦同不真空論有無雖異皆俗諦耳二通結是故法門非一非二結前所被法門非一亦非無量也四諸佛同說四初一佛例多大王一切諸佛說般若波羅蜜多先舉所例我今說般若波羅蜜多無二無別果同無二教同無別汝等大眾受持讀誦如說修行即為受持諸佛之法二顯功德多二初明能說多大王此般若波羅蜜多功德無量標示功德多若有恒河沙不可說諸佛能化諸佛多是一一佛教化無量不可說有情所化眾生多是一一有情皆得成佛有情得果多是諸佛等復教化無量不可說有情亦皆成佛展轉成佛多二顯所說多是諸佛等所說般若波羅蜜多有無量不可說那庾多億偈說不可盡謂展轉成道一切諸佛各各別說有爾所偈不可窮盡那庾多此云一億三舉少況多於諸偈中而取一偈分為千分復於千分而說一分句義功德尚無窮盡何況如是無量句義所有功德一分句義所說功德尚不可盡況無量句義詎可測度耶四校量勝多二初舉一念信超苦若有人能於此經中起一念淨信大品云於一切法不信是信般若是人即超百劫千劫百千萬劫生死苦難二況四法行得樂何況書寫受持讀誦為人解說即四法行所得功德即與十方一切諸佛等無有異上同涅槃寂靜樂下成菩提覺法樂當知此人諸佛護念不久當成阿耨多羅三藐三菩提五聞法悟道說是法時有十億人得三空忍三賢菩薩得三假空百萬億人得大空忍四加行菩薩徧解十方空無量菩薩得住十地始於歡喜終至法雲隨地證入大文次三品辨外護者初護國品正顯外護二不思議品兼陳外護三奉持品廣前二護今初正顯外護護國品第五初來意者前之三品具明因果總為內護內護既彰外護宜顯故次來也二釋名者注經題目已解護國然其護義竊嘗原之有世間護出世間護焉何者夫諸佛菩薩悲智輔翼灑諸法雨救護羣品此出世間護也聖帝明王五侯百辟君臣護法子育黎元此世間護也世出世間彼此同德釋梵四王天龍八部尚自降祉況乎三災七難詎有存而不滅者乎三解經四初勅聽許說爾時世尊告波斯匿王等諸大國王諦聽諦聽我為汝等說護國法此一唱經蓋答觀如來品初諸王念請故前文云吾知十六諸國王等咸作是念世尊大慈普皆利樂我等諸王云何護國即同華嚴交絡相望中第三念請亦以言說答也然佛既知王請護國而先說護佛果護十地行者謂若無內護因果則外難無由悉滅是故先說內護後說外護耳二正陳護國三初明護時一切國土若欲亂時一切國土即諸王所統若欲亂時亦是器世間有情世間為所護也如下經云天地變恠等即器世間亂也百姓喪亡等即有情世間亂也又云置百佛像等即智正覺世間為能護也有諸災難賊來破壞災謂三災難謂七難賊有二種一外劫盜賊二內煩惱賊護亦有二一鬼神眾二般若教以鬼神眾斷劫盜賊以般若教斷煩惱賊二示護法三初弘經置像汝等諸王應當受持讀誦此般若波羅蜜多嚴飾道場置百佛像百菩薩像百師子座請百法師解說此經置佛像菩薩像各百者非獨表百法師所歸所向謂觀如來品為果護即置佛像菩薩行品為因護即置菩薩像是故先置因果內護之像次請百法師說外護之教此其表耳然近世依經建百法師會即請百僧讀金光明經以謂仁王光明皆法王之經譬夫周易毛詩皆素王之教其益物皆同也嘗取近喻以況遠旨今夫氷之與水其濕性皆同也融之則水結之則氷若依佛言請百僧讀仁王般若其猶融氷成水不遠復矣而叛聖意請諸方袍讀金光明譬夫煎水求氷不亦難乎然而學周易則究潔淨精微治毛詩則探溫柔敦厚若以二經益物皆同又何異以詩教溫柔敦厚同易經潔淨精微者乎唯期有道革凡弊而遵聖訓是所願焉二備設供儀於諸座前然種種燈燒種種香散諸雜華廣大供養燈然酥蠟香燒沉檀春夏散草木諸華冬寒散繒綵等華衣服臥具飲食湯藥房舍牀座一切供事蘭盆疏以四事供養三尊謂房舍衣服飲食湯藥此加臥具牀座即房舍之資用耳三說聽除難每日二時講讀此經若王大臣比丘比丘尼優婆塞優婆夷聽受讀誦如法修行災難即滅且夫玅慧真詮雖藉旦夕激揚而不以生滅心行說實相法門在乎止觀雙流方清三災而滌七難矣然則百席講筵唯置一座處于宸宮而國王大臣咸允諦聽餘皆散置京畿別舘洎諸外郡俾夫僧尼士女聞斯行諸故曰聽受讀誦如法修行也三彰護益三初總明能護大王諸國土中有無量鬼神一一復有無量眷屬若聞是經護汝國土每座各有主屬無量而說者宜乎自勉發揮至教俾其尊法重人則正法久住矣二別列所護二初列幽明若國欲亂鬼神先亂鬼神亂故即萬人亂當有賊起百姓喪亡鬼神亂者有二因緣一者國王破滅三寶天神不祐疾疫惡鬼日來侵害二者王福盡時一切聖人悉皆捨去七難必起若準涅槃為貪國境興師相伐枉死者眾則百姓喪亡既而善神出境惡鬼為災則當有賊起二列依正國王太子王子百官互相是非漢制皇帝之子曰太子諸侯之子曰世子互相是非如漢之巫蠱天地變怪日月眾星失時失度大火大水及大風等是諸難起文屬此章義連下句三由教示益二初持說經文是諸難起皆應受持講讀此般若波羅蜜多恠難競起修德可禳所謂天作孽猶可違也二獲福祛難二初獲福若於是經受持讀誦一切所求官位富饒男女慧解行來隨意人天果報皆得滿足若於是經受持讀誦二句貫通祛難之初二祛難疾疫厄難即得除愈杻械伽鎻撿繫其身皆得解脫破四重戒作五逆罪四重即婬殺盜妄五逆謂殺父害母殺阿羅漢出佛身血破和合僧及毀諸戒及者有二義一揀前義顯是二事謂前明根本四重此顯枝末餘篇二合集義非但破小乘輕重及毀大乘十重四十八輕故云諸戒也上皆別列下句總結無量過咎悉得消滅三引昔護國三初引天王大王往昔過去釋提桓因為頂生王為猶被也領四軍眾象馬車步亦名四兵來上天宮欲滅帝釋梵語釋提桓因此方云能天主撫育勸善能為天主故更有異釋如華嚴音義時彼天主即依過去諸佛教法敷百高座請百法師講讀般若波羅蜜多經頂生即退天眾安樂天福自在威光特尊尚崇般若請加救護況於人王孰不修奉然帝釋亦於善法堂說十善法門唯被天眾耳二引人王二初班足依邪教二初過邪師大王昔天羅國王有一太子名曰斑足以足斑駁故立其名賢愚經智度論皆敘彼緣登王位時有外道師名為善施與王灌頂至玅虗通目之曰道心遊道外即稱外道輪王太子將登王位亦取海水以灌其頂乃令斑足取千王頭以祀塚間祭而無已曰祀塚間所住處也摩訶迦羅大黑天神上句梵音下句唐言翻大黑天也神鬪戰神也若賢愚經說祀羅剎王斷肉經說祀山神二取千王自登王位已得九百九十九王唯少一王北行萬里乃得一王名曰普明普明王經斷肉經皆說取百王二普明遵正法四初陳願允從其普明王白斑足言願聽一日禮敬三寶飯食沙門斑足聞已即便許之二敷座請講其王乃依過去諸佛所說教法敷百高座請百法師一日二時講說般若波羅蜜多八千億偈三正說偈辭即於八千億偈中舉其無常苦空無我八首偈文俾王與諸眷屬悟解證空展轉聞益耳文二初標說人時彼眾中第一法師為普明王而說偈言二正說偈四初演無常劫火洞然大千俱壞劫謂壞劫能壞者三災今唯言火災故俱舍云此千陪大千皆同一成壞須彌巨海磨滅無餘具云須彌盧此云玅高巨大也上壞器世間下壞有情世間梵釋天龍諸有情等梵謂梵王通四禪天王釋謂帝釋即忉利天主舉此攝餘諸天天龍通八部諸有情即六趣四生尚皆殄滅何況此身三界有勝劣六趣有苦樂彼皆壞滅何況自己一身二宣八苦生老病死憂悲苦惱此之四苦於欲界中隨逐違境憂悲交切苦惱相陵怨親逼迫能與願違怨謂怨憎會苦親即愛別離苦逼迫即五盛陰苦能與願違求不得苦愛欲結使自作瘡疣三界無安國有何樂無明愛欲九結十使是作業因自既作業自受苦果如瘡如疣三界皆苦一國何樂三說法空有為不實從因緣起盛衰電轉暫有即無有為之法虗妄不實從因託緣和合生起緣聚則盛緣離則衰其猶電轉暫生即滅諸界趣生隨業緣現如影如響一切皆空三界勝劣等處隨共業所感六趣苦樂等身隨別業所感如明鏡現影空谷應響一切有法畢竟皆空四闡無我識由業漂乘四大起無明愛縛我我所生謂總報識由業漂動乘其四大起為身相內有無明於五蘊中而執為我外有愛縛於國資具而起我所識隨業遷身即無主應知國土幻化亦然即前報識隨業遷往餘趣受生即無主也正報既遷應知依報國土幻化亦復如是四因偈獲益五初普明受偈益爾時法師說此偈已時普明王聞法悟解證空三昧若聞前偈應得初果以無常等苦諦行故或聞法證空解法空理即至初住也王諸眷屬得法眼空次王領解至十信位二諸王誦偈益其王即便詣天羅國諸王眾中而作是言仁等今者就命時到悉應誦持過去諸佛所說般若波羅蜜多偈即前八偈諸王聞已亦皆悟解得空三昧各各誦持誦偈悟理如普明王三斑足聞偈益時斑足王問諸王言汝等今者皆誦何法斑足緣熟問以辨之爾時普明即以上偈答斑足王王聞是法亦證空定空定即空三昧四敘誤還國益歡喜踊躍告諸王言我為外道邪師所誤非汝等咎內喜外躍故自克責汝各還國當請法師解說般若波羅蜜多展轉化人法利無盡五出家獲證益時斑足王以國付弟出家為道得無生法忍即證初地然斑足外道或內祕外現逆順化跡欲使聖教流芳豈凡小心思口議哉三例諸王三初例過去大王過去復有五千國王常誦此經現生獲報由常誦持故受現報二例現在汝等十六諸大國王修護國法應當如是受持讀誦解說此經請百法師如向所陳三例未來若未來世諸國王等為欲護國護自身者亦應如是受持讀誦解說此經然則提綱舉領已揚三世之言修法崇規佇播萬國之譽四聞法悟道說是法時無量人眾得不退轉不退有四信位行證各隨所宜阿修羅等得生天上等餘七部皆得上升無量無數欲色諸天得無生忍大品云初地菩薩得無生法忍大文第二不思議品兼陳護國不思議品第六初來意者前品百座講演般若護國安民災難悉滅此品獻華顯般若玅旨功深難測故次來也二釋名然不思議略有二種一德相二業用如華嚴經明塵含法界量等虗空即德相不思議也淨名經以毛吞巨海芥納須彌即業用不思議也今經世尊為諸大眾現不可思議神通變化乃至無量大海入一毛孔無量須彌入芥子中即業用不思議是皆言語道斷心行處滅亦同法華非言所宣非心所測耳碧海法師又謂不思議有二一者內本謂實相口欲談而辭喪心將緣而慮亡二者外迹謂巨細相容殊形並應然幽關難啟聖應不同非本無以垂迹非迹無以顯本本迹雖殊而不思議一也釋曰雖彰內本外迹多明業用同教一乘而涉德相別教一乘耳三解經四初聞法忻躍爾時十六國王及諸大眾聞佛說此般若波羅蜜多甚深句義歡喜踊躍聞於前品今昔護國皆由般若此亦躡前聞法起後散華故總科云兼陳護國也二大眾散華先華成寶座三初散華成座散百萬億眾寶蓮華若約表法即地前菩薩緣文字般若修因舍果而無染故於虗空中成寶華座表諸法空為行所依二佛坐說法十方諸佛表化身如來無量大眾若例纂要即信解位共坐此座說般若波羅蜜多三持華成輪是諸大眾持十千金蓮華散釋迦牟尼佛上梵語釋迦牟尼此翻能仁寂默合成華輪蓋諸大眾上句表已轉法輪下句表聞法獲益二華為雲臺三初散華成臺復散八萬四千芬陀利華即白蓮華王等重散故云復也表初地見道最初一念具八萬四千波羅蜜多於虗空中成白雲臺表觀照般若破無明闇見性明白下經亦云譬如有人登大高座即等覺位今唯表初地聖人二臺中說法臺中光明王佛與十方諸佛表他受用報身無量大眾例纂要歡喜他證道演說般若波羅蜜多一音演說隨類各解三持華供佛是諸大眾持曼陀羅華曼陀羅此方云適意散釋迦牟尼佛及諸眾會三華作寶城二初散華作城復散曼殊沙華曼殊沙此方云柔輭於虗空中變作金剛寶城表實相般若證涅槃城無破壞故二諸佛說法城中師子奮迅王佛共十方諸佛亦表報身大菩薩眾依纂要即二地已上諸大菩薩演說勝義般若波羅蜜多復言勝義者以中道玅理唯佛窮盡故亦同金剛大因清淨第一勝是名第一般若波羅蜜耳四華成雲蓋前之三段以三種般若表修因證果即攝用歸體門今此一科亦以三種智慧表得果不捨因即依真起應門復散無量天諸妙華於虗空中成寶雲蓋成一寶蓋即表根本智證實相真性徧覆三千大千世界表流出後得智發觀照玅慧是華蓋中雨恒河沙華從空而下表流出大悲心即文字般若說三藏十二分教二王等發願時波斯匿王及諸大眾見是事已歎未曾有合掌向佛而作是言願過去現在未來諸佛常說般若波羅蜜多下文今日即是現在願諸眾生常得見聞如我今日等無有異三佛印勸持佛言大王如汝所說此般若波羅蜜多是諸佛母諸菩薩母上印般若體下印般若用不共功德神通生處諸佛同說能多利益是故汝等常應受持十八不共六種神通皆從母生三佛現神變二初總標爾時世尊為諸大眾現不可思議神通變化躡前不可思議所散之華起後逈超言念依正之報即大同業用解脫也神通即諸聖神境智通變化有二依瑜伽云一能變通謂改轉故二能化通謂化現故下文前四相入即改轉能變通第五中依正互現即化現能化通耳二別列五初諸華相入一華入無量華無量華入一華此中但有一入無量無量入一第一第二兩句若取上句一字對下句一字即第三句一華入一華又上句無量對下句無量即第四句無量華入無量華下文準此皆成四句思之二佛土相入一佛土入無量佛土無量佛土入一佛土若望諸佛所說佛土亦有淨穢故法華云三界朽宅屬于一人亦如淨名身子所見丘陵坑坎佛言我此土淨而汝不見大疏謂感娑婆者對華藏而見娑婆感華藏者對娑婆而見華藏彼約淨穢隱顯自在今明一多悉皆相容三塵剎相入一塵剎土入無量塵剎土無量塵剎土入一塵剎土謂一微塵中剎土入無量微塵中剎土故大經偈云塵中悉現無量剎清淨廣大如虗空一切塵中所現剎皆是本願神通力初半偈釋上句後半釋下句又云華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在皆顯德相不思議耳四巨細相入無量大海入一毛孔無量須彌入芥子中此中兩句但明多入一例前亦有一入多今具出之則成四句謂無量大海入一毛孔一毛孔入無量大海無量須彌入一芥子中一芥子入無量須彌中龍樹指淨名毛吞巨海芥納須彌為小不思議則業用解脫指華嚴塵含法界量等虗空為大不思議則德相解脫然不壞須彌芥子大小之相亦具德相解脫如大疏釋善財讚彌勒樓閣中說五凡聖相入三初明正報身一佛身入無量眾生身無量眾生身入一佛身圭峯祖師謂生佛交徹淨穢融通即事事無礙法界二顯依報土大復現小小復現大淨復現穢穢復現淨現大現小即變化土故唯識云若變化身依變化土或淨或穢或大或小前後改轉佛變化身依之而住能依身量亦無定限然彼論約化為佛土成熟隨未登地有情既云化為佛土前後改轉即同今文復現大小淨穢耳或以八地已上攪大海為酥酪變大地為黃金以染為淨以淨為染自在攝生即此依報淨復現穢穢復現淨其正報之身即大復現小小復現大若依此義義則粗通奈何違於唯識大小皆屬依報耶二雙結依正佛身不可思議眾生身不可思議乃至世界不可思議請觀結文如次對之四眾覩獲益當佛現此神變之時十千女人現轉女身得神通三昧得神通用猶證如幻三昧無量天人得無生法忍若據聞菩薩行品時眾獲益無量天人大眾有得伏忍等聞護國品無量無數欲色諸天得無生忍今得無生法忍是亦聞法增道自淺階深也無量阿修羅等成菩薩道前聞護國品修羅八部得生天上然菩薩道言通地前地上今成菩薩道即自下升為高地前菩薩也恒河沙菩薩現身成佛前聞菩薩行品無量菩薩得一生補處即等覺位今現身成佛即升玅覺或謂聞第三菩薩行品得補處等覺何故經中有無量菩薩聞第四二諦品但得住十地耶答夫證道之眾有始終在座者則聞法增道有後來之徒從聞思修或住十地昔人亦云有橫入之機此其例歟三奉持品廣前二護奉持品第七初來意有二一廣內護謂此品十三法師依持建立廣前菩薩行品十三忍位明了覺解說般若教故次來也二廣外護以此品明五方菩薩說祕密般若永除七難廣前護國品一百法師講顯了般若滅除諸難故次來也二釋名言奉持者謂欽奉聖教軌持物解亦受持講說耳三解經四初見佛說教爾時波斯匿王覩佛神變躡前見千華臺上徧照如來賢首梵網疏謂梵本盧舍那此云光明徧照然照有二義一內以智光照真法界此約自受用義二外以身光照應大機此約他受用義言如來者亦同疏文坐華臺上實身成佛也千華葉上千化身佛即同疏云其千華上千釋迦為是千摩醘首羅天上各有一釋迦千華葉中無量諸佛即同疏云此千釋迦一一各化作百億釋迦故有千百億釋迦故云無量諸佛也上疏文皆釋彼經我今盧舍那方坐蓮華臺等偈義既大同故略引釋各說般若波羅蜜多然梵網明十重四十八輕多說菩薩戒波羅蜜今經說菩薩般若者以其實教六度皆互相攝如彌勒頌云檀義攝於六資生無畏法彼一檀度尚攝後之餘五今說般若豈不攝前之五度耶故纂要云萬行之中一一不可闕此故云各說般若波羅蜜多矧匿王見自他受用之身聞無量諸佛各說是經亦非聊爾人矣二匿王申問白佛言世尊如是無量般若波羅蜜多不可識識不可智知云何諸善男子於此經中明了覺解為人演說問意謂般若深經非凡夫所識非二乘所知云何等人於理則明於事則了覺解利他為人演說耶三如來正答三初法師奉持文三初修觀為法師佛言大王汝今諦聽從初習忍至金剛定習忍即十住菩薩金剛定即法雲地如法修行十三觀門地前三賢緣修地上十聖真修皆為法師依持建立以道德教人曰法師為出世憑託曰依持始而發之曰建終而成之曰立二勅眾令供養汝等大眾應當如佛而供養之百千萬億天玅香華而以奉上尊法重人故應奉供三廣列賢聖位先明三賢具三十位今釋位名則正依華嚴大疏或引諸經若夫申明三賢經義則多引大經長行蓋遵清凉之茂規至下經文當曉傍正今初十住法師即初賢於中有三初總標善男子其法師者習種性菩薩若比丘比丘尼優婆塞優婆夷修十住行初法師列僧尼士女者由修觀門有德業故如善財往南方初見德雲比丘乃至休舍優婆夷其類非一無相大師集云夫欲出超三界未有絕塵之行徒為男子之身而無丈夫之志石壁靖師注曰但懷出世之心隨塵無染即號丈夫不論男女故涅槃云若具四法即名丈夫何等為四一善知識二能聽法三思惟義四如說修行無此四法不名丈夫願諸有智思而行之二別列見佛法僧發菩提心初發心住也瓔珞云是上進分善根人若一劫二劫已於一恒二恒佛所行十信心信三寶常住發心即住名發心住華嚴云此菩薩見佛世尊形貌端嚴色相圓滿乃至或聞如來廣大佛法發菩提心初發心住為總下之九住為別故前菩薩行品明十住但云初發心相有恒河沙眾生見佛法僧是也於諸眾生利樂悲愍二治地住也謂常隨空心清淨潔白練治心地使悲智增明名治地住華嚴經云此菩薩於諸眾生發十種心所謂利益心大悲心安樂心安住心憐愍心攝受心守護心同己心師心導師心今云利樂悲愍即十心中利益安樂大悲憐愍四心也亦攝餘六以總收別故自觀己身六界諸根一切無常苦空無我三修行住也謂巧觀空有增修正行名修行住然華嚴經開此一住而為二門一自分二勝進自分即一切無常苦空無我勝進即自觀己身六界諸根初自分有十種所謂觀一切法無常一切法苦一切法空一切法無我一切法無作一切法無味一切法不如名一切法無處所一切法離分別一切法無堅實今文但有前四亦攝後六如彼疏廣釋後勝進有勸學十法所謂觀察眾生界法界世界地界水界火界風界欲界色界無色界今文但言六界即地水火風及空識界以無色界空無邊識無邊為六耳言諸根者秦本謂五色五受男女意命十四根為諸根即以四大成身為所依諸根即能依也了知業行生死涅槃四生貴住也謂生佛法家種性尊貴名生貴住故華嚴經云此菩薩從聖教中生成就十法一永不退轉二於諸佛所深生淨信三善觀察法四了知眾生五國土六世界七業行八果報九生死十涅槃今文有四若將了知二字貫於業行生死涅槃但有三法此即自分文無勝進者略能利自他饒益安樂五具足方便住也謂帶真隨俗習無量善巧化無住故而華嚴中乃以二門釋之謂自分十心亦是方便也勝進十心亦是具足也故經云此菩薩所修善根皆為救護一切眾生饒益一切眾生安樂一切眾生哀愍一切眾生度脫一切眾生令一切眾生離諸災難令一切眾生出生死苦令一切眾生發生淨信令一切眾生悉得調伏令一切眾生咸證涅槃今但有二謂饒益安樂即自分利他也其勝進即自利十心備如彼經聞讚佛毀佛心常不動六正心住也謂成就般若故聞毀讚三寶正念不動故故大經云此菩薩聞十種法心定不動所謂聞讚佛毀佛於佛法中心定不動聞讚法毀法聞讚菩薩毀菩薩聞讚菩薩毀菩薩所行法聞說眾生有量無量聞說眾生有垢無垢聞說眾生易度難度聞說法界有量無量聞說法界有成有壞聞說法界若有若無餘九句下皆有於佛法中心定不動言今文但有初一以攝餘九聞有佛無佛心定不退七不退住也謂入於無生畢竟空性心心常行空無相願止觀雙運緣不能壞故名不退住故大經云此菩薩聞十種法堅固不退所謂聞有佛無佛於佛法中心不退轉聞有法無法聞有菩薩無菩薩聞有菩薩行無菩薩行聞有菩薩修行出離修行不出離聞過去有佛過去無佛聞未來有佛未來無佛聞現在有佛現在無佛聞佛智有盡佛智無盡聞三世一相三世非一相餘九句皆有於佛法中心不退轉言今文但有初一亦例前釋三業無失起六和敬八童真住也謂心不生倒不起邪魔破菩薩心故名童真住故大經云此菩薩住十種業所謂身行無失語行無失意行無失隨意受生知眾生種種欲知眾生種種解知眾生種種界知眾生種種業知世界成壞神足自在所行無礙此經但有前三無失為自行化體故而後七皆為利他又前三業起六和敬謂身行無失則身和同事戒和同修語行無失則語和同默利和同均意行無失則意和同忍見和同解秦經云修六和敬所謂三業同戒同見同學方便善巧調伏眾生九法王子住也謂從法王教生於正解當紹佛位名法王子住然華嚴中明此一住經疏皆廣今但略引自分經疏釋上句勝進經疏釋下句如自分經云善知所行方便疏釋云知諸乘作業所入法門及善巧故即上句謂方便善巧也勝進經云法王處觀察疏釋云入則觀父王察其聲色出則觀群臣知其賢愚菩薩入則觀佛教理出則審機可否即下句謂調伏眾生也勤學十智神通化利十灌頂住也謂從上九住觀空得無生心最為上故諸佛法水灌心頂故如勝進經云此菩薩應勤學諸佛十種智所謂三世智佛法智法界無礙智法界無邊智充滿一切法界智普照一切世界智住持一切世界智知一切眾生智知一切法智知無邊諸佛智下句神通化利即讚勝經云此菩薩身及身業神通變現成就佛土等三結品下品修習八萬四千波羅蜜多三賢之初名為下品具修諸度對治八萬四千塵勞門耳二攝信成位三初總明三聚善男子習忍以前即十住前經十千劫行十善行有退有進上明不定聚下舉喻例釋譬如輕毛隨風東西謂修上品十善隨邪正風志無決定大疏亦云毛道凡夫隨風不定若至忍位入正定聚若至伏忍習種性位慧住於理得住不退即入正定聚也不作五逆不謗正法揀邪定聚即不為闡提二修觀顯位知我法相悉皆空故住解脫位上句修觀下句顯位即同本業始入空界住空性位大疏亦云仁王不開十信攝在十住信為能成住為所成三結住進行於一阿僧祇劫修習此忍能起勝行能起中賢十種勝行二十行法師四初總標中賢復次性種性菩薩住無分別修十慧觀住無分別智為總修十慧觀為別即次文十行二別列十位捨財命故初歡喜行謂施悅自他故名歡喜而言捨財命者一外財二身命如經云此菩薩為大施主凡所有物悉能惠施其心平等無有悔吝乃至云修此行時令一切眾生歡喜愛樂此即捨外財也又云受廣大身以是身肉充足一切飢苦眾生乃至若有一小眾生未得飽足願不捨命所割身肉亦無有盡此即捨身命也持淨戒故二饒益行謂三聚淨戒亦益自他故名饒益如經云菩薩如是持淨戒時諸大惡魔各將天女欲來惑亂菩薩道意是故不生一念欲想此即攝律儀戒也又云唯除方便教化眾生而不捨於一切智心即攝眾生戒也又云作是學已離諸惡行以智入於一切佛法此即攝善法戒也上皆義引心謙下故三無違逆行謂忍順物理名無違逆如經云此菩薩常修忍法謙下恭敬不自害不他害不兩害上三治瞋行忍不自取不他取不兩取次三治貪正成忍行故不自著不他著不兩著後三治癡修忍然大經具明耐怨害忍安受苦忍諦察法忍此三文廣故但引三毒兼釋忍順物理利自他故四無屈撓行謂勤無怠退名無屈撓如經云此菩薩修諸精進所謂第一精進大精進勝精進乃至性無三毒性無憍慢性不慳嫉此自利行也又云菩薩以此所行方便於一切世界令一切眾生乃至究竟無餘涅槃此利他行也生死無亂故五無癡亂行謂以慧資定離沉掉故名無癡亂如經云此菩薩成就正念心不散亂堅固不動廣大無量無有迷惑死此生彼心不散亂入胎出胎心不散亂發菩提意心不散亂事善知識心不散亂然本業經說無明之鬼不亂不濁住正念故名離癡亂今此但從一義故云生死無亂無相甚深故六善現行謂慧能顯發三空之理般若現前故名善現如經云此菩薩身業清淨語業清淨意業清淨乃至無得無相甚深難入菩薩如是解一切法悉皆甚深復作是念若我自解此甚深法唯我一人獨得解脫此皆自利甚深也又我云當先化眾生行菩薩行未成熟者先令成熟此即利他甚深也達有如幻故七無著行謂不滯事理故名無著如經云此菩薩以無著心於念念中能入阿僧祗世界嚴淨阿僧祇世界於諸世界心無所著上引嚴剎無著兼釋住名次引稱深興念正釋經文達有如幻如下經謂菩薩作是念我應觀一切法界如幻諸佛如影菩薩行如夢佛說法如響乃至一切法如實際不可變異然則前明法界如幻即體從緣後結一切法如實際即事而寂不求果報故八難得行謂大願可尊故名難得如經云此菩薩成就難得善根難伏善根最勝善根不可壞善根此亦先引修成善根兼釋住名次引度脫眾生正釋經文不求果報彼經又云我於眾生無所適莫無所冀望乃至不求一縷一毫及以一字讚美之言前第七行以方便為體此難得行以大願為體得無礙解故九善法行謂善巧說法名善法行如經云此菩薩為一切世間天人魔梵沙門婆羅門乾闥婆等作清凉池攝持正法不斷佛種釋曰清涼池即喻無熱惱池下經云得具足義陀羅尼故義辯無盡得覺悟實法陀羅尼故法辯無盡得訓釋言辭陀羅尼故辭辯無盡得無邊文句無盡義無礙門陀羅尼故無礙辯無盡此四辯才如彼大池流出四河相續入海此位以力度為體念念示現佛神力故十真實行謂言行不虗故名真實如經云此菩薩成就第一誠實之語如說能行如行能說此菩薩學三世諸佛真實語念念悉見不可說不可說諸佛及佛莊嚴清淨國土示現如來自在神力普徧法界虗空界向引兩節經文初釋行名後釋經旨若約智度為體受用法樂成熟有情並如行能說如說能行即是真實三修觀明空對治四倒三不善根三世惑業十顛倒故十行為能治十倒為所治謂四念治常等四倒三善根治貪等三倒三世惑業治外道斷常等倒同前十二因緣明三世因果以惑為因業報為果我人知見念念虗偽了達名假受假法假皆不可得上明人空下明法空無自他相住真實觀無自相即能緣心無他相即所緣境心境雙泯唯一真空名真實觀四結行進向中品修習八萬四千波羅蜜多於二阿僧祇劫行諸勝行得堅忍位行十勝行進十向位得名堅忍三十向法師四初總標上賢復次道種性菩薩住堅忍中觀諸法性得無生滅梵網以十迴向名十金剛即住堅忍大經云了一切法證寂滅性故無生滅二別列十位四無量心能破諸闇一救護一切眾生離眾生相迴向謂大悲廣濟名為救護一切眾生大智無著故云離眾生相如經云此菩薩住般若波羅蜜多大慈大悲大喜大捨修如是等無量善根古德詺此以為行體若順前名救護眾生是悲離眾生相為智則以悲智為體次經又云為一切眾生作炬破一切無明闇故為一切眾生作燈令住究竟清淨處故上句如人執炬委悉而照下句令得解脫故涅槃云澄渟清淨即真解脫常見諸佛廣興供養二不壞迴向謂於三寶等得不壞信以此善根用將迴向如經云此菩薩於去來今如來所得不壞信悉能承事一切諸佛故於一切佛法得不壞信發深志樂故於諸菩薩得不壞信誓修一切菩薩善根無疲厭故上句佛次句法後句僧上皆義引以兼釋名次引經正釋本文下經又云見無量佛承事供養以阿僧祇寶阿僧祇華阿僧祇鬘阿僧祇衣等廣有六十七供事故云廣興供養常學諸佛住迴向心三等一切諸佛迴向謂學三世佛所作迴向名等諸佛如經云此菩薩隨順修學去來現在諸佛世尊迴向之道如是修學迴向道時見一切色乃至觸法若美若惡不生憎愛心得自在若準此文但等三世諸佛迴向之道準下經亦等善根故文云如過去佛所行一切善根我亦如是故所修善根皆如實際四至一切處迴向謂菩薩令其善根至一切處如經云此菩薩修習一切諸善根時作是念言願此善根功德之力至一切處譬如實際無處不至至一切眾生至一切國土至一切虗空至一切三世至一切有為無為至一切語言音聲至是能至所修善根即是所至然準下經文若因若果皆至一切能於三昧廣作佛事五無盡功德藏迴向謂迴向故能成無盡功德之藏如經云此諸菩薩具大威儀宿植善根入不思議自在三昧方便善巧能作佛事放佛光明普照世間無有限極乃至生如是處有如是德常作佛事然此位菩薩由緣無盡境行迴向故成無盡善根功德之行得十無盡藏之果從能迴行及果受名耳現種種身行四攝法六入一切平等善根迴向謂順理修善事理無違入於平等如經云此菩薩或為帝王臨御大國威德廣被名震天下凡諸冤敵靡不歸順發號施令悉依正法周行率土所向無礙乃至以四攝法攝諸眾生為轉輪王一切周給然大經本分中名入一切平等善根迴向牒名中即云隨順堅固一切善根迴向疏釋云入即隨順平等即堅固平等之理不可壞故住無分別化利眾生七等隨順一切眾生迴向謂以善根等心順益眾生如經云此菩薩如是施時但發專求一切智道心一切悉捨心哀愍眾生心教化成熟心皆令安住一切智智心然此位經文甚廣而引此五句者謂疏以前之二句即大智後之三句即大悲故引釋此經上句住無分別即同彼大智下句化利眾生亦同彼大悲智慧明了甚深觀察八真如相迴向謂善根合如以成迴向如大經偈云以玅智慧恒觀察究竟廣大真實理斷諸有處悉無餘如彼真如善迴向然此位中初明長行後說偈頌長行有三種迴向一迴向菩提二迴向眾生三迴向實際前二隨相行後一離相行今但引偈頌中離相迴向一偈釋經對如合辨文旨有據亦表三藏之巧譯非說者之穿鑿也一切行願普皆修習九無縛無著解脫迴向謂不為相縛不於見著作用自在故名解脫如經云以無著無縛解脫心成滿普賢迴向行願勤修普賢諸根行願得聰明根勤修一切善根一切佛平等境界根受一切菩薩不退轉記大精進根然大經疏具明信進念定慧五根今但略引以釋勤修一切行願耳能為法師調御有情十入法界無量迴向謂稱性起用以法界善根迴向法界故如經云此菩薩摩訶薩以離垢繒而繫其頂住法師位廣行法施起大慈悲安立眾生於菩提心為諸眾生作調御師示諸眾生一切智道大疏以法施為總慈等為別皆是法施夫法施者生解之玅方起行之根本入聖域之階漸超苦海之津梁古德云此經中託人以弘道歎法師之勝德故知法施之功過財施之難喻三修觀受生善觀五蘊三界二諦並如菩薩行品但前廣此略為異無自他相得如實性釋義倣前十行雖常修勝義而受生三界何以故業習果報未壞盡故初標次徵後釋當句自釋不俟繁文於人天中順道生故在天而天處人而人順修中道隨報受生四結賢進聖上品修習八萬四千波羅蜜多於三阿僧祇劫修二利行廣大饒益得善調伏諸三摩地諸三摩地即止觀雙運故大經迴向品偈云禪定持心常一緣智慧了境同三昧上結三賢下進十聖住勝觀察修出離所大經迴向品亦云皆已觀察皆得清淨廣大功德出離法中能證平等聖人地故能證平等即初地住平等忍準諸經論多說三阿僧祇成佛今經地前已經三阿僧祇者演義鈔謂地前菩薩二乘聖者見初入地皆謂究竟故說三祇成等正覺亦佛隨宜故寶雲經實經無量阿僧祇劫大經華藏品初疏有會釋又瑜伽說有二種無數劫皆如大經疏鈔
