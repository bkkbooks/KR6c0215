body:
  text: 大宋國傳賢首祖教沙門淨源撰集菩薩行品第三將釋此品三門同前初來意者前品已護佛果此品護十地行果德既彰因行將陳故次來也二釋名菩謂菩提此翻云覺薩者薩埵此云衆生謂以智上求菩提用悲下救衆生從境得名然則有悲即隨相行有智即離相行悲智相導成無住行然清涼釋華嚴三十九品皆列四門一來意二釋名三宗趣四解經今文不開宗趣者謂前觀如來品依賢首略疏三種般若潛申宗趣次後二諦品準圭峰纂要三種智慧密示宗體故此但列三門而不開宗趣耳二釋文二初匿王徵問爾時波斯匿王白佛言世尊護十地行菩薩摩訶薩應云何修行云何化衆生復以何相而住觀察問意謂護因菩薩修何行業化諸衆生復用何相而住平等觀察利物耶二如來酬答初以五忍答修何行業二以十王答化諸衆生三以諸幻答平等觀察初總答前二問二別答第三問初中文分為六初如來闡教先明五忍文三初總示佛告大王諸菩薩摩訶薩依五忍法以為修行上總標下別列所謂伏忍以勝解刀折伏煩惱信忍信真如理已親證故順忍由智隨順妙證中道無生忍以權實智證理無生皆上中下前之四忍皆具三品於寂滅忍因行果德證法不滅而有上下後之一忍但有二品名為菩薩修行般若波羅蜜多結修行業也二別釋五忍然本業瓔珞經亦明六性六慧若對五忍數目不同縱辨開合恐瀆經旨文五初伏忍下品十住明十心三初總標十住善男子初伏忍位起習種性修十住行發明熏習以大智為因名習種性即初賢十住也十住之名備如下文二別明觀門三初緣境發心初發心相有恆河沙衆生見佛法僧發菩提心者有心體心相心德今言心相即攝前心體攝後心德謂此菩薩見三寶為所緣之境初發心相即能發之心故下文初發心住云見佛法僧發菩提心自既發心令他亦然故云有恆河沙衆生見佛法僧二取信成位發於十信所謂信心念心精進心慧心定心不退心戒心願心護法心回向心楞嚴經十心前六列名同後四先後異彼文七護法八回向九戒十願然諸經明義十信未成位但為住因與今文不同者清涼演義云仁王詺十住為十信故取能成信詺所成位故三明化利益無此段經與起信十解菩薩依此觀門顯發心利益其義一揆具此十心躡前而能少分化諸衆生論云菩薩發是心故則得少分見於法身隨其願力能現八種利益衆生超過二乘一切善地論又謂一發心後遠離怯弱畢究不畏墮二乘地吾祖圭峯謂馬鳴菩薩宗百部大乘造起信論此論通釋一百部經者斯良證矣三結成功業是為菩薩初長養心為聖胎故十住是三賢之初入位之始故云初長養心也聖胎者如子孕在胎藏中故下經偈云伏忍聖胎三十人既胎三賢將誕十聖生如來家也若依梵網經十長養即十行菩薩故賢首釋云增修善根故名長養二中品十行明十治三初總標十行復次性種性菩薩修行十種波羅蜜多習已成性以大悲為因名性種性即中賢十行也大疏明行體云若約別體即以十波羅蜜為體十行之名亦如下文二別明觀門起十對治能治即十度所治亦十即四倒三毒三世也所謂觀察身受心法上所觀境下能治行不淨諸苦無常無我觀身不淨觀受是苦觀心無常觀法無我即離四倒也治貪瞋癡三不善根上所治下能治起施慈慧三種善根起施善根治貪毒起慈善根治瞋毒起慧善根治癡毒觀察三世總標過去因忍過去二支因謂無明行也現在因果忍現在五支果謂識名色六入觸受也現在三支因謂愛取有也未來果忍未來二支果謂生老死也此皆流轉觀忍者智也即還滅觀三結成功業此位菩薩廣利衆生以十度妙行利諸有情上顯功成下超凡外超過我見人見衆生等想通結三毒三世外道倒想所不能壞別結外道四倒三上品十向明十忍三初總標十向復次道種性菩薩修十回向將證聖道以大願為因名道種性即上賢十回向也十向之名亦如下文二別明觀門起十忍心謂觀五蘊色受想行識上所觀境下能觀智得戒忍定忍慧忍解脫忍解脫知見忍謂觀色得戒忍觀受得定忍觀想得慧忍觀行得解脫忍觀識得解脫知見忍此即轉五蘊性成五分法身觀三界因果得空忍無相忍無願忍觀三界了惑為因業報為果得三忍解脫門三解脫義見次文觀二諦假實諸法無常得無常忍一切法空得無生忍觀俗諦相假了諸法無常得無常忍觀真諦性實達一切法空得無生忍三結成功業此位菩薩作轉輪王能廣化利一切衆生為金輪王王四天下上來以智悲願釋三種性蓋宗初祖起信三心示三賢位演義又謂相似名種體同曰性故關中云如稻自生稻不生餘穀此屬性也萌幹華粒其類不差此屬種也若謂生起修習種子現行性自仁賢性自成就以釋之又何異或配入名相著事乖宗者乎二信忍文四初標位斷障復次信忍菩薩謂歡喜地下品離垢地中品發光地上品能斷三障色煩惱縛下經初地斷諸無明滅三界貪二地斷瞋等習三地滅無明暗即同大經發光地云邪貪邪瞋及以邪癡悉得除斷言色煩惱縛者昔以貪瞋癡緣於色境造身口業為業所繫名之為縛今三惑既亡即得解脫故下偈云歡喜離垢與發光能滅色縛諸煩惱具觀一切見口業法性清淨照皆圓準大經發光地所陳行淨具明五縛而色縛當第三廣釋如彼疏文二總修諸行行四攝法攝有情故布施財法二種攝所衆生受語六波羅蜜依衆生說利行教化衆生令行六度同事以神通力種種變化入五趣中與諸衆生同其事業上依大般若略釋若成實論多約小乘廣釋此四如莊嚴論修四無量遍益有情生無量福慈無量心慈則無瞋而能與樂悲無量心悲則無害而能拔苦喜無量心喜則無嫉而行欣慰捨無量心捨則無貪而行平等然此四心皆以兩句釋之上句即依顯揚出體下句即用俱舍釋義具四弘願依四諦境發四願心斷諸纏蓋願斷煩惱常化衆生願度衆生修佛知見願學法門成無上覺願成佛道住三脫門約境住三空約證明三脫空解脫門觀諸緣起知無我人了自性空無作受者得空解脫無相解脫門觀諸有支皆自性滅畢竟解脫無少生相得無相解脫無願解脫門如是入空入無相已無有願求大悲為首教化衆生得無願解脫三別指根本此是菩薩摩訶薩從初發心從發心住至一切智等覺諸行根本因位菩薩皆以四攝諸行而為根本然信忍三品具列一十五行而為根本者向前取即該三賢向後取即通等覺由是順忍已下但有斷障現身之功而無別修根本之行學者預悉則思過半矣四現身顯益利益安樂一切衆生現身往剎影在次文以初地聖人往百佛剎利樂衆生二地千剎三地萬剎益物彌廣也三順忍文二初標位斷障復次順忍菩薩謂𦦨慧地下品難勝地中品現前地上品能斷三障心煩惱縛下經四地永斷微細身邊見故五地斷隨小乘樂求涅槃六地能盡三界集因集業粗現行相亦同大經現前地云不懼異論離二乘道入諸智地以此三句對前三障文辭雖異義旨稍同言心煩惱縛者此之三障唯意識俱故名心縛今三障既斷其心空寂故下偈云𦦨慧難勝現前地能斷三障迷心惑空慧寂然無緣觀還照心空無量境善戒經亦明心煩惱彼約八地至十地無功用道斷之此約四五六地不須會釋耳二現身顯益能於一身遍往十方億佛剎土現不可說神通變化利樂衆生億之一字該其三地謂四地菩薩往一億佛剎利樂衆生五地百億六地千億耳然證真大士皆修諸行現形濟物前信忍略現身往剎今順忍略一十五行譯人善巧影略其文妙在此矣四無生忍亦二初標位斷障復次無生忍菩薩謂遠行地下品不動地中品善慧地上品能斷三障色心習氣下經七地斷諸業果細現行相八地斷諸功用九地斷無礙障此之三障大經善慧地雖無其文至奉持品一一會釋言色心習氣者前明色心二縛已斷現行煩惱今顯習氣即斷種子餘習也然長行中斷色心習氣與偈頌中離合廣略不同謂長行合辨但約三地斷之其文亦略也偈頌離說如云順道法愛無明習遠行大士獨能斷無明習相識俱轉不動善慧法雲地二諦理圓無不盡復如法雲一地其文又廣也二現身顯益而能示現不可說身隨類饒益一切衆生七地菩薩往萬億佛剎饒益衆生八地往百萬微塵數佛剎九地往百萬億阿僧祇微塵數佛剎言隨類饒益者如觀音圓通三十二應耳然前文顯神通變化隱此隨類饒益今文顯隨類而隱現通此又譯家隱顯之妙矣五寂滅忍於中有四初標位斷障二現身顯益三辨正揀邪四敘昔明果今初標位分兩品文二初明忍同復次寂滅忍者佛與菩薩同依此忍此位菩薩初入十地名法雲地十地出心即名等覺然華嚴經但明法雲不開等覺正同此也又瓔珞經雖開等覺亦同今經彼明等覺照寂妙覺寂照雖因果有異而忍體是同二示品異金剛喻定住下忍位名為菩薩至於上忍名一切智金剛喻定即最後勝定此定現前能斷一切微細障種謂無間道修名為菩薩解脫道證名一切智二斷障證二覺觀勝義諦斷無明相是為等覺以中道智觀勝義諦斷無明相即微細障種故瓔珞云登中道山頂與無明父母別離下明妙覺一相無相平等無二為第十一一切智地實相不並真故平等無二以下忍同上忍為第十一一切智地二現身顯益二初真身非有非無湛然清淨無來無去常住不變同真際等法性體絶有無即同真際湛然清淨也相無去來即等法性常住不變也二應身無緣大悲常化衆生乘一切智乘來化三界上句大悲下句大智謂一切如來從因至果大悲大智常相輔翼往來三界化度衆生三辨正揀邪二初辨正二初凡迷三界善男子諸衆生類一切煩惱業異熟果二十二根不出三界不出三界之言結上四義所謂諸衆生類三界正報也一切煩惱三界業因也業異熟果三界報果也二十二根三界染淨根也故通結云不出三界一切煩惱謂事理二惑發業潤生即助發緣也業謂自業有三一罪二福三不動即感生因也異熟果者謂作業感果前後不同異時而熟即無記果也然二十二根通於染淨謂眼等六根男女二根命根苦樂憂喜捨五受根此上十四皆染法也信進念定慧五根三無漏根此八皆淨法也廣釋有頌如俱舍論二聖化三有諸佛示導應化法身亦不離此報化二身導諸有情亦不離三界也法身即報身有自他受用之殊應化即化身有大小隨類之異或曰他受用身為地上菩薩於淨土中說一味之經而言不離三界者何耶答感三界者對淨土而見娑婆感淨土者對三界而見華藏是則心淨即佛土淨耳二揀邪若有說言於三界外別更有一衆生界者即是外道大有經說衛世師外道說有六諦一實二德三業四大有五同異六和合今言大有即彼第四大有經也四敘昔明果二初敘昔告衆大王我常語諸衆生但斷三界無明盡者即名為佛既斷三界無明成佛即知離三界無衆生也然他宗說三界外有無明者彼約權機斷界內界外無明今顯實教一念妙慧與理相應不斷而斷無明即明即本覺佛矣豈與夫界外同日而語哉二明果指本自性清淨名本覺性即是諸佛一切智智以始覺智冥本覺性即究竟覺其唯一切智智乎由此得為衆生之本亦是諸佛菩薩行本梵網云是大衆諸佛子之根本諸佛之本源行菩薩道之根本引文前却釋義便故二通結是為菩薩本所修行五忍法中十四忍也妙慧唯一約法分五升降有殊開成十四也二十王位答化諸衆生二初牒問佛言大王汝先問言菩薩云何化衆生者二正答三初寄位度生二初略標菩薩摩訶薩應如是化從初一地至後一地自所行處初一歡喜地後一法雲地自所行處即十地增修十度也及佛行處一切知見故極證妙源即佛行處力無畏等即一切知見二廣釋十初地轉轉聖王若菩薩摩訶薩住百佛剎大經云此地菩薩若行精進捨家妻子出家學道於一念頃得百三昧以淨天眼見百佛國作贍部洲轉輪聖王贍部梵音下文具翻言輪王者舉輪寶也修百法明門修於五位百法明門已證真如成妙觀察智以檀波羅蜜多住平等心由破分別我執成平等性智然此菩薩具七最勝三輪清淨一切常捨施度偏增化四天下一切衆生前回向位作轉輪王王一四天下今化百剎四天下廣狹可見二地忉利天王若菩薩摩訶薩住千佛剎作忉利天王梵語忉利此云三十三即天帝釋中宮也修千法門門說十善道化一切衆生上品十善此地戒度圓滿文無者略下皆倣此三地夜摩天王若菩薩摩訶薩住萬佛剎作夜摩天王梵音夜摩此云時分修萬法明門依四禪定化一切衆生此地菩薩雖行禪定化物而不隨禪感果四地覩史天王若菩薩摩訶薩住億佛剎作覩史多天王覩史多此方云知足修億法明門行菩提分法化一切衆生以三十七道品化諸有情五地化樂天王若菩薩摩訶薩住百億佛剎作化樂天王能自變化五欲樂境修百億法明門二諦四諦化一切衆生根有利鈍故以二諦四諦被之華嚴具十重四諦六地他化自在天王若菩薩摩訶薩住千億佛剎作他化自在天王他化作樂具自得受用修千億法明門十二因緣智化一切衆生華嚴明因緣智依天親論文具明十種七地初禪天王若菩薩摩訶薩住萬億佛剎作初禪梵王初禪即梵衆等天修萬億法明門方便善巧智化一切衆生以權實二智化物方便即權智八地二禪天王若菩薩摩訶薩住百萬微塵數佛剎作二禪梵王二禪即少光等天修百萬微塵數法明門雙照平等神通願智化一切衆生以空中方便慧照俗諦有中殊勝行照真諦故得平等中道起神通願智之力化諸羣品九地三禪天王若菩薩摩訶薩住百萬億阿僧祗微塵數佛剎作三禪梵王三禪即少淨等天修百萬億阿僧祗微塵數法明門以四無礙智化一切衆生謂法義辭樂說四無礙辨大經亦明十重十地四禪天王若菩薩摩訶薩住不可說不可說佛剎不可說等即華嚴大數第十作第四禪大梵天王為三界主居色界頂大自在天宮即三界主也修不可說不可說法明門得理盡三昧即真如三昧同佛行處同寂滅忍盡三界原上明欲界色界諸天今顯無色四天故前文云但斷三界無明盡者即名為佛普利衆生如佛境界大品亦云十地菩薩當知如佛三總結是為菩薩摩訶薩現諸王身化導之事二例諸如來十方如來亦復如是證無上覺常遍法界利樂衆生前明因行此例果德因果交徹同濟羣生三大衆供讚爾時一切大衆即從座起散不可說華焚不可說香供養恭敬稱讚如來聞法欣慶供讚伸誠二匿王偈讚二初標說儀時波斯匿王即於佛前以偈讚曰然頌總有四種一名阿耨窣覩婆頌此不問長行與偈但數字滿三十二即為一偈二名伽陀此云諷頌或名不頌頌不頌長行故或名直頌謂以偈說法故三名祗夜此云應頌四名縕䭾南此云集施頌謂以少言攝集多義施他誦持故今此即伽陀頌頌者美盛德之形容也為何意故經多立頌略有八義一少字攝多義故二諸讚歎者多以偈頌故三為鈍根重說故四為後來之徒故五隨意樂故六易受持故七增明前說故八長行未說故今此正唯前二義兼五六二正說偈於中分三初一偈半總讚三寶次二十八偈別讚五忍後半偈結讚禮敬然此偈讚或斷諸障異於長行或所成行文義隱顯故傳授者善消息之文二初總讚三寶世尊導師金剛體歎佛寶也真身無相常住不壞喻金剛體萬物不能沮也世尊導師即歎應身下文長行多明真應二身心行寂滅轉法輪八辨圓音為開演歎法寶也上句依體起用謂不以生滅心行而轉法輪也下句正明演法八辨者即八音七辨也八音如梵摩喻經云一美妙二易了三調和四柔軟五不誤六無雌七尊重八深遠言七辨者一捷辨須言即言無蹇吃故二迅辨懸河𣶏冷不遲訥故三應辨應時應機不增減故四無疏謬辨凡說契理不邪錯故五無斷盡辨相續連環終無竭故六凡所演說豐義味辨一一言句多事理故七一切世間最上妙辨具足甚深如雷等故言圓音為開演者大經云佛演一妙音周聞十方國衆音悉具足法雨皆充滿時衆得道百萬億天人俱修出離行能習一切菩薩道歎僧寶也出離行通二乘僧菩薩道即大乘僧二有二十八偈別讚五忍二初略示五忍功德妙法門十四菩薩能諦了上句標法下句舉人十四菩薩即三賢十聖及等覺三賢十聖忍中行唯佛一人能盡原此半偈約因果歎十四忍唯佛一人攝等覺照寂故佛法衆海三寶藏無量功德於中攝謂三寶海藏無量功德於五忍中並皆攝盡海之一字蒙上三寶二廣釋五初伏忍文分三初兼讚十善十善菩薩發大心長別三界苦輪海大心即悲智也以智上求以悲下化即令自他長別苦海中下品善粟散王上品十善鐵輪王修中下二品十善雖無輪寶而能散粟養善濟物為散粟小王上品福勝作鐵輪王王一閻浮提二正讚三賢習種銅輪二天下銀輪三天性種性道種堅德轉輪王七寶金輪四天下伏忍聖胎三十人十住十行十回向習種性十住菩薩為銅輪王王東南二洲性種性十行菩薩為銀輪王王東南西三洲道種性十回向菩薩為金輪王王四洲七寶謂輪寶象寶馬寶珠寶女寶兵寶藏寶慈恩云金輪望風順化銀輪遣使方降銅輪震威乃服鐵輪奮戈始定皆無殺害耳三世諸佛於中學無不由此伏忍生夫陟遐必自邇故三世諸佛皆從伏忍生孰有萬德之果不由三賢之因乎學者效也效之而後定也三讚信成位有一偈半乍觀其文似通相般若之意細詳其義皆華嚴一乘玄旨故略引賢首品偈文會釋達者博覽勿生局見一切菩薩行根本是故發心信心難賢首品云信為道元功德母長養一切諸善法又謂是故依行次第說信樂最勝甚難得若得信心必不退進入無生初地道次偈云若得信心不退轉彼人信力無能動信能惠施心無吝信能歡喜入佛法然歡喜入佛法即初地化利自他悉平等是名菩薩初發心下偈云及信無上大菩提菩薩以是初發心大菩提具悲智行即自利化他也二信忍此下皆明十地地地具彰三義一地名二化境三成行然第一地名總居其首餘之二義左右互陳今釋地名全依天親論文化境經中隨地增數成行則準清涼疏義既知所宗次釋經文文二初別讚三品初讚下品歡喜菩薩轉輪王謂成就無上自利利他行初證聖處多生歡喜名歡喜地初照二諦平等理權化有情遊百國初入信忍以實智照平等理以權智化諸有情上明化境檀施清淨利羣生成行有四一約增勝二約所成三約修成四約實行入理般若名為住住生德行名為地智與理冥曰入唯就法稱名之為住就義約喻故名為地本業經云生成一切因果名為地耳初住一心具衆德於勝義中而不動初地具顯恆沙性德分證中道不為空有所動二讚中品離垢菩薩忉利王謂離能起誤心犯戒煩惱垢等清淨戒具足故名離垢地現形六趣千國土化境戒足清淨悉圓滿永離誤犯諸過失大疏云此亦由翻破戒之失為無邊德是以成於戒行無相無緣真實性無體無生無二照真如性中無破戒垢今稱性持故所照無相能照無緣謂諸菩薩契窮實性自體無染故無體無生也三讚上品發光菩薩夜摩王謂隨聞思修等照法顯現故名明地現猶發也明即光義應形往萬諸佛剎化境善能通達三摩地隱顯自在具三明大經云三摩鉢底此云等至由離沉掉至一境故此地菩薩成行唯禪及求法行以聞法竟靜處修行方發定故下文亦云於無相忍而得三明二總明斷障歡喜離垢與發光能滅色縛諸煩惱牒前具觀一切身口業法性清淨照皆圓昔由三毒煩惱緣於色境造身口業今觀七支皆空能滅色縛故得法性照皆圓矣三順忍科文同前初讚下品𦦨慧菩薩大精進不忘煩惱薪智火能燒名曰𦦨地𦦨即慧𦦨故名𦦨慧地覩史天王遊億剎化境實智寂滅方便智達無生理照空有以權實二智雙照空有成無住行故疏云便能成菩提分行及不住道行精進不退二讚中品難勝菩薩得平等謂得出世智方便善巧能度難度故名離勝地化樂天王百億國化境空空諦觀無二相垂形六趣靡不周上空字無生死相下空字無涅槃相故能隨類化身周旋六趣無不利生由是此地菩薩其所成行亦成二種謂諸諦增上慧行及五明處教化行三讚上品現前菩薩自在王謂妙達緣生引無分別名般若行親如目覩名曰現前照見緣生相無二勝義智光能遍滿謂此地中住緣生智悟一切法無染淨二相所成行即般若故得勝義如空而周遍智光如日而圓滿往千億土化衆生所化境也二有一偈總明斷障𦦨慧難勝現前地能斷三障迷心惑牒前空慧寂然無緣觀以空觀斷四地微細身邊二見以假觀斷五地小乘樂求涅槃以無緣觀斷六地集因集業粗現行相還照心空無量境昔迷心惑而成三障今照心空能了妙境則染法滅而淨法起矣四無生忍三初讚下品文三初正明下品遠行菩薩初禪王善修無相行功用究竟能過世間二乘出世間道故名遠行住於無相無生忍方便善巧悉平等上句明實智下句顯權智謂此菩薩以能空中起勝行成方便度權實二行雙行故名悉平等常萬億土化羣生所化境也二有半偈敘進中品進入平等法流地大經云諸佛世尊親現其前與如來智令其得入法流門中永無分段超諸有壽無分限身無形段即超三有生死報也三約行斷障常觀勝義照無二中道無二二十一生空寂行地地有始生住生終生故七地二十一生皆修空寂行順道法愛無明習遠行大士獨能斷順道即順忍故智論云於柔順忍無生忍中間有法愛故此位獨斷前文長行約遠行不動善慧三地能斷色心習氣今遠行地獨斷法愛無明習者以色習最粗即法愛無明故此地斷之心習極細故不動善慧法雲三地斷之下偈云無明習相識俱轉二諦理圓無不盡向云偈讚斷障異於長行蓋謂此也二讚中品不動菩薩二禪王得變易身常自在報行純熟無相無間名不動地捨三界行生受變易果故云報行釋變易生死具如別章能於百萬微塵剎隨其形類化衆生化境悉知三世無量劫於第一義常不動明所成行名無生法忍相土自在初中後際悉皆平等故大經云成就此忍即時得入第八地三讚上品善慧菩薩三禪王得無礙力說法成就利他行故名善慧地得無礙慧尚未稱善遍說遍益方名為善能於千恆一時現若依長行所化之境即住百萬億阿僧祗微塵數佛剎然此偈頌譯人省文但言千恆耳常在無為空寂行恆沙佛藏一念了明所成行即善達法器自在說法之行故大經云於一念頃悉能領受亦以一音普為解釋各隨心樂令得歡喜五寂滅忍文二初正明下品法雲菩薩四禪王得大法身具足自在故名法雲此有二義如華嚴疏於億恆土化羣生化境始入金剛一切了二十九生永已度寂滅忍中下忍觀一轉妙覺無等等修行智度住生名二十九生更轉一生鄰近妙覺無等等位謂無等之位互相齊等二通前斷障不動善慧法雲地除前所有無明習除前第七遠行地獨斷順道法愛無明習無明習相識俱轉二諦理圓無不盡習相即習氣識俱轉者謂生滅八識與習氣俱轉故唯識云如瀑流水上下魚草等物隨流不捨此識亦爾與內習氣外觸等法恆相續轉此亦色心習氣不動善慧二地斷之若據下文法雲地斷神通障於一念頃能遍十方微塵國土化諸衆生乃至隨順如來寂滅轉依既斷神通障寂滅轉依亦同偈云二諦理圓無不盡耳二讚上品文四初正讚果德正覺無相遍法界三十生盡智圓明讚斷德以圓明一切種智斷除三十生之惑顯淨法身也寂照無為真解脫大悲應現無與等讚恩德用無緣之大悲拔有情之衆苦顯真解脫也湛然不動常安隱光明遍照無所照讚智德以根本實智證湛然真理顯照般若也二揀因異果三賢十聖住果報三賢居變化土十聖住他受用報土準瓔珞經義亦大同唯佛一人居淨土全同瓔珞居法性土攝論又云自受用身是實成佛稱周法界身土相稱依正無礙唯佛獨住更無菩薩一切有情皆暫住登金剛原常不動在觀似聖人出觀即凡夫名為暫住下句即等覺三通讚三業如來三業德無量隨諸衆生等憐愍身業則圓回普應若月落百川語業則稱物普聞若風吹萬籟意業則剎那頓覺若海印炳然上總讚下別讚法王無上人中樹普廕大衆無量光讚身業法王慈覆譬樹廕人放光益物破諸癡暗口常說法非無義讚口業外道說法有字無義權小未圓唯佛所說有字有義心智寂滅無緣照讚意業心智寂滅語其體一無緣而照辨其用異四別讚益物人中師子為演說甚深句義未曾有雙顯二空名為甚深故天親云諸佛希有總持法不可稱量深句義塵沙剎土悉震動大衆歡喜皆蒙益微塵恆沙剎土皆悉震動示數量之橫廣三結讚禮敬世尊善說十四王是故我今頭面禮讚終展禮修敬備矣三時衆獲益爾時百萬億恆河沙大衆聞佛世尊及波斯匿王說十四忍無量功德獲大法利聞法悟解三賢悟解得無生忍入於正位十聖正位淨名云若以無生得受記者無生即是正位四敘昔得果爾時世尊告大衆言是波斯匿王已於過去十千劫龍光王佛法中為四地菩薩我為八地菩薩今於我前大師子吼表其決定無畏說也五印成歎法文二初印成所說如是如是如汝所說得真實義不可思議能詮深奧如汝所說所詮真實心言罔測雙印二詮故重言如是唯佛與佛乃知斯事唯佛能仁也與佛諸佛也下文云是故我今略述所說又云三世諸佛如實能知故總結云乃知斯事二敘歎忍法四初總標因果善男子此十四忍諸佛法身諸菩薩行不可思議不可稱量初二句總標果德因行次二句明心言罔測稱量罔及下文先釋稱量罔及至文可見二別釋因果二初徵何以故何故諸佛菩薩依十四忍不可思量耶二釋二初果德境智一切諸佛即總標中諸佛法身皆於般若波羅蜜多中生王宮降生般若波羅蜜多中化轉正法輪般若波羅蜜多中滅雙林入滅上明觀照般若下明實相般若而實諸佛生無所生化無所化滅無所滅後轉釋實相云第一無二第一義諦絶待無二非相非無相釋生無所生無自無他釋化無所化無來無去釋滅無所滅如虗空故攝觀照用歸實相體皆如虗空耳二因行境智二初約境空文二初諸法空善男子一切衆生即總標中諸菩薩行略疏亦翻薩埵為衆生性無生滅所觀真性本無生滅由諸法集幻化而有衆緣集成故如幻化上總示下別釋蘊處界相無合無散緣離即滅故無合緣會即生故無散法同法性寂然空故會諸法相同歸性空非推之使空二諸行空一切衆生自性清淨自性通凡心即本源妙心所作諸行無縛無解非因非果絶諸對待即自性用非不因果修因克果即隨緣用上明淨行下明染行諸苦受行領受三苦煩惱所知煩惱障心所知障慧我相人相知見受者知見即衆生相受猶壽也即壽者相一切皆空染行淨行一切皆空三境界空法境界空上標下釋空無相無作釋此三義淨名有文無作即無願耳不順顛倒不順幻化不隨染境顛倒不順淨境幻化無六趣相無四生相開之為六趣合之為四生具如演義無聖人相四乘聖人無三寶相住持別相二種三寶如虗空故照境空寂猶如虗空二約智空三初約法明權實善男子甚深般若無知無見不行不緣不捨不受謂無知無見則實智照而無照不行緣捨受則權智為而無為二約人明中道正住觀察而無照相正住即中道智行斯道者如虗空故教道即三賢證道即十聖照智空寂亦如虗空三凡小墮有無法相如是結前有所得心無所得心皆不可得有心即凡夫無心即二乘故皆不證得也三稱量罔及二初約法釋是以般若非即五蘊非離五蘊觀照妙慧非即五蘊實相真性不離五蘊非即衆生非離衆生非即境界非離境界次二對準上釋之初對五蘊世間次對衆生世間後對器世間非即行解非離行解理絶修證非即行解智有淺深非離行解如是等相不可思量二約人釋是故一切菩薩摩訶薩所修諸行未至究竟而於中行即前總明十三忍一切諸佛知如幻化得無住相而於中化即後別指上品忍故十四忍不可思量前文先諸佛而後菩薩約得果不捨因今此先菩薩而後諸佛約果化由因行四心言罔測三初所說益物善男子汝今所說此功德藏有大利益一切衆生前文謂如汝所說得真實義不可思議唯佛與佛乃知斯事二舉人喻說假使無量恆河沙數十地菩薩說是功德百千億分如海一渧有謂忍德圓明量同法界喻如大海十地讚說於百千億分中皆如一渧耳有云般若忍法是諸佛功德之藏法雲匿王之所說如海之一渧焉初解唯喻菩薩後解兼喻匿王初解近理若助成其義謂十地因人未窮果海上品忍是故所說如一渧耳後解未盡其源設王匿所讚亦如一渧何以前文印許云如汝所說得真義耶誠由匿王讚十四忍與佛所說奧義符合故云唯佛與佛乃知斯事三果知因讚三世諸佛如實能知已證寂滅上品忍一切賢聖悉皆稱讚即前十三品者是故我今略述所說少分功德唯佛與佛能知其際故略述匿王所說忍法少分功德六勸修指同六初修顯三世同善男子此十四忍十方世界過去現在一切菩薩之所修行進修萬行一切諸佛之所顯示十方世界過去現在一切諸佛顯示忍法未來諸佛菩薩摩訶薩亦復如是未來諸佛顯示菩薩修行同於過去現在二因果一路同若佛菩薩不由此門得一切智者無有是處門喻忍法若不由此忍門得妙覺一切智者無有是處誰人出不由戶耶上反顯下順明何以故何故要由忍門諸佛菩薩無異路故因人所修果人所證一門一路耳然經旨依五忍同起信乘三大故彼論云一切諸佛本所乘故一切菩薩乘此法到如來地故三標忍生信同善男子若人聞此住忍行忍回向忍歡喜忍離垢忍發光忍𦦨慧忍難勝忍現前忍遠行忍不動忍善慧忍法雲忍正覺忍能起一念清淨信者四超罪得果同是人超過百劫千劫無量無邊恆河沙劫一切苦難不生惡趣八苦八難四惡趣不久當得阿耨多羅此云無上三藐三菩提此云正遍正覺謂正智遍智覺知真俗不偏不邪五因名果說同是時十億同名虗空藏菩薩摩訶薩與無量無數諸來大衆歡喜踊躍承佛威神普見十方恆沙諸佛各於道場說十四忍如我世尊所說無異承佛威神下亦具見聞同例如華嚴法慧菩薩說十住終而彼時衆普見十方同名菩薩同說十住但彼約因人所說此約果人極唱耳六大衆奉行同各各歡喜如說修行般若波羅蜜多然則言之匪艱行之唯艱今茲海衆言以顧乎行行以顧乎言言行相顧故云如說修行也二別答第三問謂了能度所度皆如幻化觀察有情染淨識本令修諸觀反妄歸真也於中有三初牒匿王致問二明如來正答三敘時衆獲益今初爾時世尊告波斯匿王汝先問云復以何相而住觀察二明如來正答三初略示菩薩摩訶薩應如是觀初句標住觀察次四句釋能所觀以幻化身而見幻化以幻化之身觀幻化之衆正住平等無有彼我能化幻身平等即無有我所度幻衆平等即無有彼彼我無二名為正住後二句雙結如是觀察化利衆生如是觀察即以無緣幻慈廣化幻妄衆生也二廣釋四初依真成妄識然諸有情於久遠劫初剎那識異於木石此一節經涉二宗義若依相宗觀察一切有情無始已來法爾有八種識於中第八阿賴耶識是其根本即此初剎那識初亦根本義無始已來即久遠劫也達磨經頌云無始時來界一切法等依而言異於木石者謂此賴耶緣三種境故今依性宗觀諸有情阿賴耶識依如來藏而具真知即異木石故密嚴云佛說如來藏世間阿賴耶全同起信如來藏與生滅和合為阿賴耶識既言生滅即此初剎那識矣二隨識生染淨生得染淨各自能為無量無數染淨識本亦約二宗以釋起信論謂若心有動則有過恆沙等妄染之義即同生得無量無數染識本故論又謂對此義故心性無動即有過恆沙等諸佛功德相義示現即同生得無量無數淨識本故上依性宗釋之若約相宗由此有諸趣及涅槃證得皆由染淨識本耳三約證示地位從初剎那不可說劫從初剎那生淨識本經不可說劫即信賢十地諸位如下文云復次法雲地菩薩從發信心經百萬阿僧祇劫廣集無量助道法增長無邊大福智是也乃至金剛終一剎那即等覺位以金剛喻定最後一剎那斷佛地障即入妙覺四約修辨諸假於中八段歷觀斯文亦具從空入假雙觀真俗如下文云色心二法如夢所見即真諦明空觀三世善惡如空中雲即俗諦明假觀然修空觀成大智則不住生死假觀成大悲而不住涅槃以真俗境不二悲智念不殊成無住行斯亦賢首心經略疏梗槩耳今初法假如幻化文三初妄識生色心有不可說不可說識生諸有情色心二法然此諸識至聖方知亦如阿僧祇品明不可說不可說數量唯佛能知能說耳上合辨色心下開成五蘊色名色蘊心名四蘊皆積聚性隱覆真實梵語塞健陀近翻名蘊古翻為陰蘊是積聚陰是陰覆故云皆積聚性隱覆真實二色法生根大大王此一色法生無量色總標眼得為色耳得為聲鼻得為香舌得為味身得為觸雖舉五根但取五塵堅持名地津潤名水暖性名火輕動名風前顯所造四微今明能造四大生五識處名五色根此五色根皆以淨色為體三總結皆幻法如是展轉一色一心生不可說無量色心皆如幻故從微至著皆如幻故然辨法假幻喻為先者幻法總故良以五天此術頗多見聞既審法理易明及傳此方翻成難曉若依古師解華嚴如幻之文法喻各開五法備如彼疏二受假如睡夢善男子有情之受依世俗立衆生妄心有受有著皆依俗諦北山録云俗也者假有也假有之有謂之似有若有若無但生有情妄想憶念有情想念如世夢寤想之即有不念即無作業受果皆名世諦作業有三種一惡二善三不動受報有三時謂現報生報後報三界六趣一切有情三界依報之土六趣正報之身下示受假姓名婆羅門此云外意淨行種也剎帝利此云田主即王種也毗舍此云商估首陀此云田農我人知見外道計也色法心法通小乘法如夢所見夢見諸境雖有受著覺來都無如諸有情受假亦然故天親論云同於夢境但唯念性故三名假如聲響善男子一切諸名皆假施設起信亦云以一切言說假名無實佛未出前獨指能仁未出世前世諦幻法無名無義無能召之名義亦無體相亦無所召體相無三界名善惡果報六趣名字善因樂果惡因苦報諸佛出現為有情故則指一佛今言諸佛影略其文說於三界六趣染淨無量名字說三界勝劣等處共業所感六趣苦樂等身別業所感染即四趣黑業淨即人天白業名如塵沙故云無量名即字耳如是一切如呼聲響空谷之響隨聲高低喻於名假悉皆無體故淨名云所聞聲如響等四相續假如陽𦦨諸法相續相續不斷如水涓涓念念不住前滅後生如燈𦦨𦦨剎那剎那非一非異欲言其一剎那生滅欲言其異相續無窮速起速滅非斷非常速起故非斷速滅故非常何者若唯速起起則是有定有則常若唯速滅滅則是無定無則斷若深求速起速滅即是非斷非常故知二義相成諸有為法如陽𦦨故春陽發生郊野氣動𦦨𦦨而起喻有為法相續不斷然此陽氣若謂是有且非水體若謂是無能引渴者故古詩云渴鹿盡尋陽五觀待假如電光諸法相待所謂色界眼界眼識界待謂對得如眼界對色界眼色和合即有識生乃至法界意界意識界略舉初後以例中間故云乃至猶如電光對待之法有生有滅喻如電光故功德施云觀察心如電生時即滅六形待假如第二月不定相待有無一異諸法不定形待而立有不自有必待於無無不自無必待於有其猶高下相形是非相生豈有定耶又一不自一對異立一異不自異對一立異更相對待豈有體哉如第二月諸法相待其猶揑目對於本月妄見有二故楞嚴云如第二月非體非影第二之觀揑所成故七緣成假如水泡諸法緣成蘊處界法夫緣成之法有染有淨染緣成六凡淨緣成四聖今此三科約觀觀境即染緣也如水上泡仗水生泡泡實無體喻法從緣亦無體矣金剛論云壽如水泡或暫停住即歸散滅八因成假如空雲諸法因成前明緣成此顯因成蓋因親緣疏而分二假一切有情俱時因果謂現世作善惡業現身受苦樂報名順現報即俱時因果也異時因果今生作善惡次一生受報名順生報即異時因果也三世善惡報有三時上二句是順現順生亦有順後報者即同原人論三世業報善惡因果如空中雲前之七喻喻真諦明空故經云一切有為法如夢幻泡影如露亦如電應作如是觀今此雲喻喻俗諦明有如經云假使百千劫所作業不忘因緣會過時果報還須受起信疏序亦云雖復繁興鼓躍未始動於心源即真諦空也靜諡虗凝未嘗乖於業果即俗諦有也故曰一代聖言皆以二諦因緣為宗若依圭峯纂要虗空中雲唯喻未來故引無著論云彼粗惡種子似虗空引心出故如雲三雙結二初別結廣略二文二初結略示善男子菩薩摩訶薩住無分別無彼此相結前文正住平等無有彼我無自他相常行化利無化利相結前文如是觀察化利衆生然常行化利即隨相行無他相也無化利相即離相行無自相也二結廣釋是故應知愚夫垢識染著虗妄為相所縛結前文生染識本著五陰相不求解脫故顯揚論云相縛縛衆生亦由粗重縛善修雙止觀方乃俱解脫菩薩照見知如幻士無有體相但如空華結前文生淨識本了色心空皆如幻故亦如空華故楞嚴云見聞如幻翳三界若空華聞復翳根除塵消覺圓淨二總結自他二利是為菩薩摩訶薩住利自他如實觀察言總結者兼結淨識中菩薩二利也三敘時衆獲益說是法時會中無量人天大衆有得伏忍空無生忍一地二地乃至十地伏忍通十信三賢空即四加行以現立少物故無生忍據前文即七八九三地耳無量菩薩得一生補處如瑜伽說知足天身補處尊故
