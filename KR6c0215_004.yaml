body:
  text: 大宋國傳賢首祖教沙門淨源撰集二十聖法師準大經疏三賢十聖皆以菩提心而為其體故清涼引起信云菩提心有三一者直心正念真如法故二者深心樂修一切諸善行故三者大悲心救護一切苦衆生故所念真如亦即本智本覺智故後二顯是恆沙性德然此三心有一必兼餘二而三賢互有增微十住直心增故故名為解解為行願本故首而明之十行深心增故名為行依於前解以起行故十向大悲增故名為願回前解行願諸衆生離苦得樂故十地三心等證故名善決定然則清涼既依起信三心之文科判華嚴四會之經故推馬鳴大士為吾宗初祖深為通才之所取證矣而習大疏者不曉清涼之言輒負馬鳴之德何愚蔽之甚耶既知地前三心增微次釋地上三心等證又此經十地地地皆列地名證如斷障觀智成行五義耳然其地名成行此二與前匿王偈中文勢大同故於偈中已依天親論文釋十地之名依清凉疏義釋十位之行今但引諸論解證如斷障亦引大經解於觀智其結位成行厥或文略則直示節段其文繁者則隨難別解今初歡喜地法師文四初創入聖位復次歡喜地菩薩摩訶薩超愚夫地大經即云超凡夫地疏釋云以得出世間聖道故超即過義生如來家疏云如世王子生王家故菩薩亦爾若在外道法中出家不足為勝今得佛所證法方為尊勝住平等忍謂初入信忍住平等理故下偈云歡喜菩薩轉輪王初照二諦平等理二證如斷障初無相智照勝義諦一相平等非相無相此地菩薩證遍行真如以無相智照二空理非有相非無相謂此真如二空所顯無有一法而不在故梁攝論中名為遍滿遍滿一切有為行故斷諸無明滅三界貪斷二障分別起者即根本無明初地施度遍增故滅三界貪唯識名異生性障梁攝論名凡夫性障十地論名凡夫我相障然經論所出名異義同備如大疏未來無量生死永不生故上明斷障即因亡此無生死即果喪三觀智利物二初約法明權實大悲為首起諸大願大經云菩薩起如是心以大悲為首智慧增上而言起諸大願者此地菩薩有十大願初發供養願乃至第十成正覺願願者是希求義故十地論云發諸大願隨心求義故於方便智念念修習無量勝行大經次前文云善巧方便所攝最上深心所持如來力無量以此三句如次對今經皆學權智也非證非不證一切遍學故權智涉有非證也實智觀空非不證也故大經云此菩薩轉更勤修一切善根而得成就敬順尊重諸佛教法故云一切遍學非住非不住向一切智故有悲故非住涅槃有智故不住生死大經亦云此菩薩不求一切資生之物求一切智地故行於生死魔不動故謂四魔中而生死魔不能動故即上文有智故不住生死大經又云菩薩住如是法名住菩薩歡喜地以不動相應故離我我所無怖畏故我與我所該五怖畏如大經云此菩薩離我想故尚不愛自身何況資財是故無有不活畏不於他所希求供養唯專給施一切衆生是故無有惡名畏遠離我見無有我想是故無有死畏自知死已決定不離諸佛菩薩是故無有惡道畏我所志樂一切世間無與等者何況有勝是故無有大衆威德畏無自他相常化衆生故謂菩薩以觀智利物不見自相為能化他相為所化終日化生而忘能所故大經云菩薩住此歡喜地念清淨波羅蜜念如來教化衆生故生歡喜自在願力生諸淨土故即前十大願中第七淨土願故大經云又發大願願一切國土入一國土一國土入一切國土無量佛土普皆清淨無量智慧衆生充滿其中隨衆生心而為示現皆令歡喜二兼喻示權實善男子此初覺智非如非智非有非無無有二相謂始覺實智一念現前非所證如非能證智唯一妙心無能所二相故唯識論云若時於所緣智都無所得爾時住唯識離二取相故方便妙用非倒非住非動非靜謂方便權智妙用應物無愛見故非倒非住實智證理不趣寂故非動非靜以無愛見異凡夫而不趣寂異二乘二利自在如水與波非一非異實智自利澄湛如水權智利他汪洋如波挹之遍乎四海非一也攝之歸於一源非異也智起諸波羅蜜多亦非一異般若二利既爾餘之五度二利亦然四結位成行於四阿僧祇劫滿足修習百萬行願有行無願其行必孤有願無行其願必虗行願相扶如鳥之兩翼車之兩輪故能翱翔致遠也此地菩薩無三界業習更不造新前十回向菩薩雖常修勝義而受生三界以其業習果報未壞盡故今此菩薩修出離行滅三界貪故無業習準華嚴疏謂此地非但斷能起煩惱障亦斷惡趣諸業果等故云不造新業也由隨智力以願生故此則智增菩薩以其願心生於淨土若是悲增即住三界利樂有情念念常行檀波羅蜜多大經云是菩薩十波羅蜜中檀波羅蜜增上餘波羅蜜非不修行但隨力隨分布施愛語利行同事經又云常行大施無有窮盡布施愛語利行同事如是一切諸所作業皆不離念佛不離念法不離念僧廣大清淨善能安住饒益衆生經云能以大施攝取衆生善除衆生慳貪之垢二離垢地法師三初證如斷障復次離垢地菩薩摩訶薩四無量心最勝寂滅此地證最勝真如謂此真如具無邊德於一切法最為勝故斷瞋等習等取邪行習氣以此地斷邪行障故謂修四無量心斷瞋習氣持性戒成就斷邪行習氣言邪行者謂所知障中俱生一分及彼所起誤犯三業能障二地故二觀智利物修一切行所謂遠離殺害大經云性自遠離一切殺生疏謂性自遠離文屬殺生義該下九不與不取經又云性不偷盜疏釋云非理損財不與而取故名為盜心無染欲經云性不邪淫疏謂乖禮曰邪染愛曰淫上皆護持身之三非得真實語經云性不妄語疏謂違想背心名之為妄無相大師云如實語者能除妄語得和合語經云性不兩舌疏謂言不乖離名離兩舌兩舌成事能令離間無相曰和合語者能除兩舌得柔軟語經云性不惡口疏謂言不粗鄙名離惡口無相曰柔軟語者能除惡口得調伏語經云性不綺語疏謂言辭不正故云綺語其猶綺文無相曰正直語者能除綺語此即護持口之四過常行捨心經云性不貪欲於他財物不願不求疏謂他所攝故此揀於己常起慈心經云性離瞋恚於諸衆生恆起慈心疏謂心不瞋毒故名離瞋住正直心經云又離邪見住於正道心見正直疏謂治異乘見小乘對大非正道故此明護持意之三愆寂靜純善離破戒垢大經有寂靜純善十種深心唯識亦云具淨尸羅遠離能起微細毀犯煩惱垢故行大慈觀念念現前大經云一切衆生互相破壞我當令彼住於無上大慈之中三結位成行於五阿僧祇劫具足清淨戒波羅蜜多經云此菩薩十波羅蜜中持戒偏多志意勇猛永離諸染重頌偈云勇猛精勤一念中我當離彼住實法上皆義引三發光地法師三初證如斷障復次發光地菩薩摩訶薩住無分別以無分別智證勝流真如唯識云謂此真如所流教法於餘教法極為勝故梁攝云從真如流出正體智正體智流出後得智後得智流出大悲大悲流出十二部經名為勝流法界故滅無明暗此地斷暗鈍障唯識云謂所知障中俱生一分令聞思修法忘失障彼三地勝定總持及彼所發殊勝三慧入三地時便能永斷二觀智利物於無相忍而得三明謂於無相信忍上品而發三明觀過去宿命明未來天眼明現在漏盡明悉知三世無來無去大經云非從前際生無過去也非向後際去無未來也非於現在住求其住相不可得故依四靜慮四無色定大經明此地菩薩修色界四禪無色界四空而清涼疏義皆依天親論文科釋論疏浩博避繁不引無分別智次第隨順大經云但隨順法故而無所染著疏云示入禪定超欲等過令物效故尚不同於二乘自為豈與凡外而同年哉具足勝定得五神通躡前起後也妙用難測曰神自在無擁曰通大疏云寄同世間故但得五現身大小隱顯自在大經云此菩薩得無量神通力以一身為多身多身為一身或隱或顯石壁山障所往無礙猶如虗空釋曰即神境通也謂外色內身皆神之境轉變多種故偏受神名亦名神足依欲勤觀之所成故亦名如意隨意成故下之四名易了天眼清淨悉見諸趣經云此菩薩天眼清淨過於人眼見諸衆生生時死時好色惡色善趣惡趣隨業而去天耳清淨悉聞衆聲經云天耳清淨過於人耳悉聞人天若近若遠所有音聲乃至蚊蚋虻蠅等聲亦悉能聞以他心智知衆生心經云以他心智如實而知有煩惱心無煩惱心散心非散心解脫心非解脫心有上心無上心皆如實知上皆義引宿住能知無量差別經云念知無量宿命差別念知一生二生乃至無量百千生我曾在某處如是名如是姓如是相貌如是言音無量差別皆能憶念然大經云念知無量今經云宿住能知者大疏云能念即宿住之知三結位成行於六阿僧祇劫行一切忍波羅蜜多大經亦云十波羅蜜中忍辱偏多得大總持利益安樂此地菩薩能圓滿聞法總持故唯識論云成就勝定大法總持能發無邊妙慧光故四𦦨慧地法師三初證如斷障復次𦦨慧地菩薩摩訶薩修行順忍無所攝受此地初入順忍證得無攝受真如謂此真如無所繫屬非我執等所依取故永斷微細身邊見故此地斷微細煩惱現行障謂所知障中俱生一分與意識中任運而生身邊二見今入此地永斷微細煩惱即二見隨斷矣二觀智利物修習無邊菩提分法菩提是覺分是因義為諸乘覺因故亦云道品品即是類因為果類故言修習無邊者若準智論但三十七無所不攝則無邊道品亦在其中念處正勤神足根力覺道具足三十七品總有七類一對治顛倒道即四念處二斷諸懈怠道謂四正勤三引發神通道謂四神足四現觀方便道所謂五根五親近現觀道即是五力六觀自體道謂七覺分七現觀後起道謂八正道具足二字蒙上七類為欲成就力無所畏不共佛法前修因行希求果德故云為欲成就三結位成行於七阿僧祇劫修習無量精進波羅蜜多十波羅蜜中精進偏多遠離懈怠普利衆生上句自利下句利他五難勝地法師三初證如斷障復次難勝地菩薩摩訶薩以四無畏一總持無畏二知根無畏三決疑無畏四答難無畏隨順真如清淨平等無差別相此地證得類無差別真如謂此真如亦約生死涅槃皆平等故斷隨小乘樂求涅槃此地斷於下乘般涅槃障今入真俗無差別道便能斷之二觀智利物集諸功德具觀諸諦上句躡前道品下句起後觀諦此苦聖諦集滅道諦苦聖二字貫於三諦故大經云此是苦聖諦此是苦集聖諦此是苦滅聖諦此是苦滅道聖諦聖者正也謂以無漏正法得在心故世俗勝義觀無量諦謂於四諦二諦以智觀彼有無量相審不虗故故經云苦有無量相非諸聲聞緣覺所知為利衆生習諸技藝大般若云五地菩薩學五明故下文具列四明多依清涼釋之但略無內明文字即聲明謂名句文身同聲論中法施設建立故醫方即醫方明謂善方藥療治諸病讚詠戲笑工巧呪術即工巧明顯德曰讚寄情曰詠誦持密言曰呪浮水入火曰術外道異論即因明謂言論尚論諍論毀論吉凶占相亦是工巧明謂占相工業由前世善惡因感此吉凶等故一無錯謬大經云咸善觀察一無錯謬彼經有持戒入禪等文即內明也但於衆生不為損惱謂無捕獵損惱生事為利益故咸悉開示謂能起助道之事漸令安住無上菩提此文從但於衆生下三句全同大經唯後句云無上菩提大經即云無上佛法為異耳知諸地中出道障道如經云前得出世未能順世即是障道也今此能以五明攝化即出道也三結位成行於八阿僧祇劫常修三昧開發諸行十波羅蜜中禪度偏多故云常修三昧餘非不修但隨力分故云開發諸行六現前地法師三初證如斷障復次現前地菩薩摩訶薩得上順忍住三脫門謂此地中上品順忍修三解脫門證得無染淨真如故大經云於空無相無願法中皆善修習言無染者謂此真如本性無染亦不可說後方淨故能盡三界集因集業粗現行相集緣也業果也即緣因緣果謂能盡十二因緣三世因果言粗現行相者此地斷粗相現行障謂所知障中俱生一分執有染淨粗相現行彼障六地無染淨道入六地時便能永斷二觀智利物大悲增上觀諸生死生死即生滅也故大經云大悲增上觀世間生滅疏釋云前滅後生染生淨滅故無明暗覆無明發業迷暗為性隱覆真理業集行支業即罪行福行不動行是彼無明所起之果故識種識支若無行熏終不成種名色若約生位四蘊曰名羯邏藍等為色六處謂四七日後諸根滿位名增則成第六意處色增則成餘之五處觸根境識三和合生觸受分別三受領納於觸愛受無厭足名愛取愛欲不捨曰取有愛取潤前六支為有生始從中有未衰變來皆名為生老死生熟為老老壞為死等皆由著我等取憂悲苦惱上明流轉門下示還滅觀無明業果非有非無一相無相而不二故無明既滅業果亦滅所以會歸中道雙非有無故云一相無相而無二也三結位成行於九阿僧祇劫行百萬空無相無願三昧大經又云百千空百千無相百千無願三昧皆悉現前得一切般若波羅蜜多無邊光照經云即得般若波羅蜜現前名無障礙智光明即般若度偏修也七遠行地法師三初證如斷障復次遠行地菩薩摩訶薩修無生忍證法無別謂此地中修無生智證得法無差別真如以了種種教法同真無相故斷諸業果細現行相以六地菩薩雖修緣起觀了無明業果而執先生後滅細相現行故此地中以純作意斷細相現行障二觀智利物住於滅定起殊勝行經云雖常寂滅以方便力而還熾然雖然不燒疏釋云唯此一句具空中方便慧有中殊勝行雖常寂滅廣化衆生即此地悲智雙行行上句智下句悲示入聲聞常隨佛智經云雖常隨順佛智而示入聲聞辟支佛地疏釋云非獨化凡亦轉二乘入佛慧故示同外道示作魔王隨順世間而常出世略引華嚴經疏例釋外道諸魔如經云雖示同外道行而不捨佛法雖超魔道而現行魔法疏釋云亦轉外道著諸見故如佛示學二仙令彼轉捨諸見著故雖示老病死衰退即四魔等法不行其因名超魔地三結位成行於十阿僧祇劫行百萬三昧善巧方便十波羅蜜中方便偏多廣宣法藏一切莊嚴皆得圓滿經云二乘所有問難無能退屈所有一切莊嚴之事出過一切等八不動地法師三初證如斷障復次不動地菩薩摩訶薩住無生忍體無增減以中品無生智證不增減真如謂此真如以住無相不隨染淨有增減故斷諸功用功用即加行義謂此地斷無相中加行障由有加行未能任運現相及土此地能斷二觀智利物心心寂滅無身心相猶如虗空大經云遠離一切身想分別無所取著猶如虗空此菩薩佛心菩提心涅槃心悉皆不起即經云佛心菩提心涅槃心尚不現起何況起於世間之心由本願故諸佛加持上句明其勸因下句總顯勸相故經云此地菩薩本願力故諸佛世尊親現其前與如來智令其得入法流門中疏釋云法流者決彼無生止水令起無功用行河任運趣佛智海經有七勸一勸修如來善調御智二勸悲愍衆生三勸成其本願四勸求無礙智五勸成佛外報六勸證佛內明無量勝行七勸總修無遺成遍知道上明能勸下顯勸所為令起智業能一念頃而起智業雙照平等經云以諸佛與如是等無量無邊起智門故於一念頃所生智業乃至所起無功用覺慧觀一切智智所行境即能照所照平等耳以十方智遍不可說大千世界隨諸衆生普皆利樂十力智即智地故大經云此菩薩智地名為不動地無能沮壞故乃至第十名為無功用地先已成就故能放光明照百萬佛剎微塵數世界令諸衆生滅煩惱火而得清涼三結位成行於十阿僧祇劫滿足百萬大願願度偏增心心趣入一切種一切智智即八地攝報果心心即念念故經云諸所作業皆不離念佛乃至不離念一切種一切智智九善慧地法師三初證如斷障復次善慧地菩薩摩訶薩住上無生忍滅心心相證智自在明上品忍念念寂滅無相為相證智自在所依真如謂若證得此真如已於無礙解得自在故斷無礙障此地菩薩斷利他中不欲行障故得四辨無障礙故二觀智利物具大神通修力無畏善能守護諸佛法藏此明正修方便及說法之德與大經廣略小異故彼經云具廣大神通修力無畏不共乃至作大法師具法師行善能守護如來法藏得無礙解法義辭辨演說正法無斷無盡大經明四無礙智一法二義三辭四樂說今經辨之一字即樂說智故彼經云此菩薩以法無礙智知諸法自相義無礙智知諸法別相辭無礙智無錯謬說樂說無礙智無斷盡說一剎那頃於不可說諸世界中隨諸衆生所有問難一音解釋普令歡喜即問答成就也故大經云此菩薩假使三千大千世界所有衆生咸至其前一一皆以無量言音而興問難一一問難各各不同菩薩於一念頃悉能領受仍以一音普為解釋令其心樂各得歡喜三結位成行於萬阿僧祇劫能現百萬恆河沙等諸佛神力力波羅蜜偏增無盡法藏利益圓滿義亦同前十法雲地法師四初地行入心復次法雲地菩薩摩訶薩無量智慧思惟觀察準大經有三句初句云以如是無量智慧疏謂無量智者阿含廣故次句云觀察覺了已疏謂證智深故後句云善思惟修習疏引寶性論中謂地上菩薩起二修行一約根本智名如實修即此證智二約後得智名遍修行即此廣智諸地具起上二種行令於此二決擇思惟今經思惟居中彼經處末從發信心發十信心經百萬阿僧祇劫廣集無量助道法增長無邊大福智大經即云集無邊助道法增長大福德智慧疏釋謂正助不住諸地同修上句助道何因成助由下句不住道以增福德故不住無為增智慧故不住有為二證如斷障證業自在此地證得業自在等所依真如謂神通作業總持定門皆自在故斷神道障斷於諸法中未得自在障此障十地大法智雲及所含藏所起事業三觀智利物於一念頃能遍十方百萬億阿僧祇世界微塵數國土悉知一切衆生心行大經有知一切衆生心行三昧疏釋云化生無垢故上中下根為說三乘謂隨他意語於一佛乘分別說三上根菩薩六度萬行喻以牛車中根緣覺十二因緣喻以鹿車下根聲聞四諦法門喻以羊車四引歸一乘普令修習波羅蜜多即隨自意語會三乘之權歸一乘之實便成受位等行具智波羅蜜即前謂無量智慧入佛行處力無所畏若準大經亦同地行入心故彼經云入如來所行處疏謂解達真如佛所行處故隨順如來寂滅轉依即寂滅忍通因果二門謂菩薩因忍以為能依如來果忍以為所依大疏亦云就果辨者究竟廣大轉也然轉依義別略有四種一能轉道二所轉依三所轉捨四所轉得如諸論說然不空三藏翻宣此經三賢十聖與華嚴地前地上行相大同者蓋晉譯微言唐翻至教已傳中國故賢聖名義有所稽耳不然則何以難勝菩薩五明益物三句經文唯無上菩提與無上佛法但兩字為異耶若夫羅什法師翻譯秦本非獨闕五方菩薩說呪抑亦十地之名多有不同蓋未見晉唐二經矣三始終伏斷依起信疏將四相粗細寄顯反流四位以明始覺分齊然此四相約真心隨熏粗細差別寄說為四非約一剎那心明四相也今先列名示數後約位分別謂生相有一住相有四異相有二滅相還一生相一者名為業相即同下經十地菩薩無間道修望果名伏也住相有四一轉相二現相三智相四相續相其相續相初地離之即同下經見道位也餘之三相七地八地九地各離一相即同下經修道位也異相有二滅相還一此皆地前離之故此不論又見修二位兼引唯識略示大意對文詳之自當顯耳次釋經文於中有二初望果名伏善男子從初習忍習忍亦名住忍即從初賢十住位也至金剛定皆名為伏一切煩惱此同起信金剛已還約未斷生相皆名為伏故論云十地菩薩皆名不覺謂不覺心源故非究竟覺彼疏釋云不了其源始末同本故也言一切煩惱者約生相根本無明生一切煩惱故論云當知無明能生一切染法此之謂也二望因名斷無相信忍照勝義諦信忍即初地以中道無相智斷二障分別證勝義遍行真如全同起信初地斷相續相耳滅諸煩惱生解脫智漸漸伏滅二地已上能滅二障俱生煩惱分得解脫而智有淺深故漸漸伏滅大同起信七地八地九地斷智相現相轉相耳四等妙修證三初修證明等妙以生滅心得無生滅同起信滿足方便故彼疏云能破和合識內生滅之相顯不生滅之性此在金剛因位極也此心若滅即無明滅心即生相此相若滅永無所餘即無明滅故起信云以覺心源故名究竟覺彼疏云始覺道圓同於本覺故也此在佛地二知見辨等妙金剛定前所有知見皆不名見即見修二位亦同前文不覺心源故非究竟覺唯佛頓解具一切智所有知見而得名見即無學位亦同次文以覺心源故名究竟覺又經云菩薩知終不知始唯佛如來始終俱知始者謂生相也終者謂餘相乃至滅相也起信法雲地即等覺位三法喻顯等妙二初等覺善男子金剛三昧現在前時而亦未能等無等等謂未能等無等之位互相齊等故云無等等重言等者唯與佛等欲顯佛佛等正覺故譬如有人登大高臺普觀一切無不斯了足有所履則登大高臺身處虗空則普觀一切可例楞嚴云如登高山身入虗空下有微礙名為頂地二妙覺若解脫位一相無相無生無滅同真際等法性前則無間道修此乃解脫道證一相無相即同真際無生無滅即等法性此之四句亦大同前文滿功德藏住如來位起信論云法性真如海無量功德藏彼疏釋云謂此法身如來藏中含攝蘊積無邊恆沙性功德故然四法中教淺理深行分果圓今取深圓唯顯理果謂上句理法即滿功德藏下句果法即住如來位耳五雙結勸修三初結菩薩善男子如是諸菩薩摩訶薩受持解說皆往十方諸佛剎土利安有情通達實相現身說法利諸有情皆令頓證實相如我今日等無有異此結前十三法師學佛行化故無有異二結諸佛善男子十方法界一切如來皆依此門而得成佛若言越此得成佛者是魔所說非是佛說結前始終伏斷等妙修證三總勸修是故汝等應如是知如是見如是信解豈唯十三法師稟行斯道抑亦十方諸佛遵仰此門法利既廣故勸衆修使知見一致信解同歸耳二偈頌二初標舉爾時世尊欲重宣此義而說偈言二重頌分三初總頌三賢彼伏忍菩薩於佛法長養堅固三十心名為不退轉所依之忍長養聖胎信心及位二俱不退二有十偈別頌十聖初證平等性而生諸佛家由初得覺悟名為歡喜地初地證妙平二智故超凡夫地生如來家遠離於染汙瞋等種種垢具戒德清淨名為離垢地二地心無染欲斷瞋等習遠離二字貫於初句滅壞無明暗而得諸禪定照曜由慧光名為發光地三地斷暗鈍障以無分別智修四禪八定清淨菩提分遠離身邊見智慧𦦨熾然名為𦦨慧地四地修菩提分法斷微細煩惱則二見隨滅矣如實知諸諦世間諸技藝種種利群生名為難勝地五地具觀四諦習學五明技藝工巧咸悉開示觀察緣生法無明至老死能證彼甚深名為現前地六地能盡十二因緣始滅無明因終盡老死果方便三摩地示現無量身善巧應羣生名為遠行地七地具空中方便慧現魔外形示二乘身住於無相海一切佛加持自在破魔軍名為不動地八地忘身心相趣寂滅海諸佛加持勸利羣品得四無礙解一音演一切聞者悉歡喜名為善慧地九地具四辨才種種問難皆以一音普為解釋智慧如密雲遍滿於法界普灑甘露法名為法雲地十地廣集助道於一念頃以大智雲遍微塵剎說一切乘利樂群生三結頌佛果滿足無漏界常淨解脫身寂滅不思議名為一切智此之一偈諸家訓釋云云實繁不能備舉今以三句別明三德一句總顯四義滿足無漏界解脫德也寂滅不思議法身德也名為一切智般若德也其第二句已顯常淨二義解脫即樂義身即我義以四義融通即三德耳二付囑奉持五初滅度災興二初明所護佛告波匿斯王我滅度後法欲滅時即後五百歲鬬諍堅固時一切有情造惡業故五逆十惡令諸國土種種災起七難之外天地災異具載下文諸國王等為護自身太子王子后妃眷屬周姬之前后即妃耳故天子之配謂之后而夏商大率稱妃也眷屬謂帝之女曰公主長公主是也百官百姓二顯能護一切國土即當受持此般若波羅蜜多皆得安樂國安民樂皆由般若前文謂奉持品廣前內外二護亦取此也二付囑所以我以是經付囑國王不付比丘比丘尼優婆塞優婆夷所以者何無王威力不能建立然西聖之教皆付囑于國王者以其威加百辟澤及庶民是故帝莊假一宵之夢樹風聲於萬古而騰蘭乘外護之詔弘德音於中華自茲歷代君臣同德而三藏微言以光被天下也上釋不付意下結勸持說是故汝等常當受持讀誦解說此文唯勸仁王三救護七難三初廣陳化境大王吾今所化大千世界百億須彌百億日月一一須彌有四天下東弗婆提此云勝身身勝餘洲故南閻浮提新云贍部俱舍云阿耨達池岸有樹名贍部因以名洲提者此云洲也西瞿耶尼此云牛貨以牛貨易故北單越此云勝生以定壽千歲衣食自然故上總明四洲下別示一天下此贍部洲十六大國五百中國十萬小國今經云大國十六楞嚴云此閻浮提大國凡有二千三百金光明云此贍浮洲八萬四千城邑聚落等隨經所出不可引例二略說七難三初總示是諸國中若七難起一切國王為除難故受持解說此般若波羅蜜多七難即滅國土安樂然此除難不必如前百座但隨宜持說耳二別列然下文七難其間日月星辰之位雷電霜雪之名並引儒典諸子以申其義若依佛經具而注之恐厭繁文耳文分七別初日月改變波斯匿王言云何七難佛言一者日月失度日色改變白色赤色黃色黑色或二三四五日並照月色改變赤色黃色日月薄食曆家之說日月之食謂日光以望時遙奪月光故月食日月同會合朔之時月掩日光日謂之食薄音博近也或有重輪一二三四五重輪現二衆星失度二者星辰失度篲星妖星也其光似除穢之象淮南子云鯨魚死彗星出一云鯨魚目為彗也木星火星金星水星土等諸星五星古德亦以五分五色配之東方木青南方火赤西方金白北方水黑中央土黃各各為變或時晝出如一行禪師使奴獲七豕即北斗七星盡出也三諸火燒物三者龍火霹𮦷起火鬼火能發疾疫人火世有五通遇現違緣意願起火樹火亢陽過時樹木起火大火四起焚燒萬物不善業熟隨處火起皆火難也四時序遷易四者時節改變寒暑不恆不恆猶云不定也上總標下別列冬雨雷電言冬寒改變也雨者陰陽二氣力均則能為雨孔子云天作時雨山川出雲雷者陰陽相感而為雷激易云雷出地豫所以開發萌芽電者陰氣伏夜泉陽氣上通天陰陽分爭故為電也准南子云電激氣夏霜冰雪言夏暑不恆也霜者大戴云陰氣勝則陽氣衰而為霜也冰者述征記云水底有礬石故上無冰凍也雪者釋名云雪綏也水下遇寒而凝綏綏然下也雨土石山及以沙礫非時降雹五行傳云陰陽相脅而為雹一云夏雹或時飛激如彈丸雨赤黑水江河泛漲流石浮山五風蔽兩耀五者暴風數起昏蔽日月發屋拔樹飛沙走石風者天地之使也山海經云四方皆有山節宣其風詳其風有發止動靜之候成敗萬物故五行志云雨旱寒燠亦以風為本四氣亂故具罰常風也六二儀為災六者天地亢陽陂池竭涸草木枯死百穀不成百穀者楊泉物理論云粱者黍稷之總名稻者溉種之總名菽者衆豆之總名三種各二十種為六十蔬果之實助穀各二十凡為百穀七四方兵起七者四方賊來侵國內外兵戈競起百姓喪亡兵所執器也戈即鎗之類說文云戈廣二寸長六尺六寸三例餘大王我今略說如是諸難其有日晝不現月夜不現天種種災無雲雨雪地種種災崩裂震動或復血流鬼神出現鳥獸怪異如是災難無量無邊曲分有三初結前次別列後總指並可見三彰能護教一一災起皆須受持讀誦解說此般若波羅蜜多四匿王驚問爾時十六國王聞佛所說皆悉驚怖波斯匿王白佛言世尊何故天地有是災難五如來為答二初正出所因佛言大王由贍部洲大小國邑一切人民不孝父母生身本故不敬師長成德本故沙門良福田故婆羅門有志道故國王通明粟散大臣兼於將相不行正法君不君臣不臣由此諸惡由上不孝不敬不行正法有是難興二總開能護二初以法合喻三初法大王般若波羅蜜多能出生一切諸佛法妙同三覺一切菩薩解脫法分證三德一切國王無上法外護三寶一切有情出離法永超三苦二喻如摩尼寶體具衆德摩尼寶梵語正云末尼此翻離垢言此寶光淨不為垢穢所染舊翻如意隨意皆義譯耳能鎮毒龍諸惡鬼神能鎮毒龍非時風雨鎮惡鬼神無橫疾疫能遂人心所求滿足隨人所須皆得遂心能應輪王名如意珠若無此珠七寶有闕能令難陀跋難陀等梵語難他此云歡喜跋難陀此云極歡喜諸大龍王降霔甘雨潤澤草木雲行雨施品物流形皆珠之益若引娑竭羅龍王所霔大雨非大海不能安受則非摩尼之澤矣若於暗夜置高幢上光照天地明如日出儒亦有言珠稱夜光故能繼照三合此般若波羅蜜多亦復如是珠既具德般若亦然二令尊聖教三初申供儀汝等諸王應作寶幢及以幡蓋燒燈散華廣大供養二示出處寶函盛經置於寶案若欲行時常導其前準僧史略云駕頭牀子即盛經七寶案也其制度以雜瓌珍間填成之欵其足高其緣所置之經即仁王護國也使中官謹願者馬上平持舒徐而啓行望乘輿可百步以為前導也即唐代宗永泰中不空三藏重譯後置耳自後諸帝或設而不作則說案上無經或置而勿論則云儀注合用此蓋弗知而不鄭重矣僧史又謂今大宋法物克全用之引導群下迎望見此知駕近百步焉所在住處作七寶帳衆寶為座置經於上種種供養三例人天如事父母亦如諸天奉事帝釋如孝子之事二親而言論天者忉利并四天王三十二天三說呪奉持五初來福去災大王我見諸國一切人王皆由過去侍五百佛恭敬供養得為帝主上推因辨果下明聖人來則為福去則為災略引僞秦彌天法師為例耳一切聖人得道果者來生其國作大利益昔僞秦太史奏有德星現於外國分野當有聖人入輔中國得之者王符堅乃命庶子丕伐襄陽取道安朱序為秦陷置道安并習鑿齒堅喜曰朕用師十萬得一人半也一人謂安半謂鑿齒國有疑謀古器服篆隸寶玉所不識者俾咨詢于安以故秦國足食足兵威振海內常患不得纘禹舊服登會稽而望滄海朝萬國以號令天下茲可例得道果者來生其國作大利益也上明來為福下示去為災若王福盡無道之時聖人捨去災難競起堅纍問安伐晉之計安亟曰晉德雖微天命未改難可圖也君子亦以為私護本朝而實得禮也故一言而兼致焉符以獨夫之見舉百萬之兵以符融治前軍水陸並進晉命謝安以水軍七萬拒之王導以鼓吹求助於蔣山神秦師大崩潰安初謂王子年曰世途若此蓋行乎年曰公可前往須吾償後債耳償亦尚音茲亦可例若王福盡聖人捨去災難競起也二敕聖護國三初總示護國大王若未來世有諸國王建立正法護三寶者我令五方菩薩摩訶薩衆往護其國二別列菩薩昔不空三藏所譯金剛頂瑜伽經其間有指菩薩名者并手執持放光等義下文略引皆青龍疏耳東方金剛手菩薩摩訶薩即普賢菩薩手持金剛杵放青色光表除一切魔衆與四俱胝菩薩往護其國兼東方持國天王及將無量乾闥婆毗舍闍而為眷屬南方金剛寶菩薩摩訶薩即虗空藏菩薩手持金剛摩尼放白色光表除諸惡鬼神與四俱胝菩薩往護其國兼南方增長天王及將無量恭畔荼薜荔衆而為眷屬西方金剛利菩薩摩訶薩即文殊菩薩手持金剛劒放金色光表除諸惡毒龍與四俱胝菩薩往護其國兼西方廣目天王及將無量諸龍富單那而為眷屬北方金剛藥叉菩薩摩訶薩即摧伏一切魔怨菩薩手持金剛鈴放琉璃色光表除一切可畏藥叉與四俱胝藥叉往護其國兼北方多聞天王及將無量藥叉邏剎娑而為眷屬中方金剛波羅蜜多菩薩摩訶薩即轉法輪菩薩手持金剛輪放五色光表伏一切鬼魅與四俱胝菩薩往護其國兼天帝釋及將無量諸天而為眷屬三立像申供是五菩薩摩訶薩各與如是無量大衆於汝國中作大利益當立形像而供養之三菩薩說呪三初整儀白佛爾時金剛手菩薩摩訶薩等即從座起頂禮佛足却住一面而白佛言世尊我等本願承佛神力本願為因佛力為緣內因外緣其功克著十方世界一切國土若有此經受持讀誦解說之處我當各與如是眷屬於一念頃即至其所守護正法建立正法令其國界無諸災難刀兵疾疫一切皆除二述呪功能世尊我有陀羅尼能加持擁護是一切佛本所修行速疾之門若人得聞一經於耳所有罪障悉皆消滅靈丹一粒點鐵成金祕呪一聞變災為福況復誦習而令通利以法威力當令國界永無衆難昔不空三藏嘗誦是呪解羌胡之圍唐天寶元年壬子歲西蕃大石康五國來冦安西其年二月十一日奏請兵解援玄宗詔發師計一萬餘里纍月方到得近臣言且可詔聞不空三藏帝依奏詔入內持念請天王為救帝秉香爐不空誦此經陀羅尼二七遍帝忽見神人可五百員帶甲荷戈在殿前帝驚異問不空對曰此毗沙門第二子獨健領兵是必副陛下意往救安西故來辭耳請設食發遣其年四月安西奏云去二月十一日已後城東北三十里雲霧晦冥中有人衆可長丈餘皆被金甲至酉時鼓角大鳴聲振三百里地動山傾經二日大石康等五國當時奔潰諸帳幕間有金毛鼠齧斷弓弩絃及器仗悉不堪用斯須城樓上有光明天王現形無不見者斯皆誦習通利護國界之明效耳三正說呪辭二初標舉即於佛前異口同音說陀羅尼曰五聖不同為異口發言無二曰同音二說呪然諸佛密語非因人所解故不可解釋今菩薩說呪乃是因人故準金剛頂瑜伽梵夾或對翻梵國之文或回順此方之語略注要義其間辨㭊阿野等言備如青龍本疏引文節釋娜謨歸命囉怛娜寶怛囉夜野三順此方言即歸命三寶上總下別娜莫頂禮阿哩夜聖者吠路者娜野遍照怛他多夜如來囉訶諦應供三藐三沒䭾野正等覺即頂禮聖者遍照如來應供正等覺上佛寶其法寶在宗旨中故此略耳下僧寶娜莫亦云稽首阿哩野聖者三滿多普跋捺囉野賢冒地薩怛嚩野略云菩薩摩賀薩怛嚩野大勇猛摩賀迦嚕抳迦野大悲者即稽首聖者普賢菩薩大勇猛大悲者次正明宗旨怛你野他所為枳穰那智鉢囉你閉燈惡乞叉野無盡句勢藏即所為智燈無盡藏鉢囉底婆娜辨才嚩底具即辨才具薩嚩一切沒䭾佛嚩盧枳諦所觀即一切佛所觀喻誐相應跛哩你澀跛寧圓成順此方言即圓成相應儼避囉甚深努囉嚩誐係難測即前圓成甚深難測底哩野特嚩三世跛哩你澀跛寧圓成即三世圓成冒地質多正覺心散惹娜你能生順此方言即能生正覺心薩嚩毗矖迦毗色訖諦以灌頂法而灌其頂達磨法娑誐囉海三步諦出生即從法海出生無礙解阿暮伽無間斷室囉嚩儜聞順此方言於諸佛所無間聽聞摩賀大三滿多普跋捺囉賢步彌地涅哩野諦出生順此方言即出生大普賢地尾野羯囉拏受記跛哩鉢囉跛你獲得順此方言獲得受記薩囉悉䭾成就人那麼塞訖哩諦作禮即十地人之所作禮薩嚩一切冒地薩怛嚩略云菩薩散惹娜你出生順此方言出生一切菩薩婆誐嚩底世尊沒䭾覺麼諦母順此方言佛世尊母阿囉彌迦囉彌阿囉拏迦囉你此十二字其義深密唯佛能知依字釋者亦得者為三業清淨摩賀大鉢囉枳穰極智播囉弭諦離義到義娑嚩賀無住義即大極智離此到彼無住涅槃四如來讚述爾時世尊聞是說已讚金剛手等諸菩薩言善哉善哉若有誦持此羅尼者我及十方諸佛悉常加護諸惡鬼神敬之如佛不久當得阿耨多羅三藐三菩提五普勸受持大王吾以此經付囑汝等毗舍離國憍薩羅國室羅筏國摩伽陀國波羅痆斯國迦毗羅國拘尸那國憍睒彌國般遮羅國波吒羅國末吐羅國烏尸尼國奔吒跋多國提婆跋多國迦尸國瞻波國如是一切諸國王等皆應受持般若波羅蜜多今經所列十六大國與秦本大同小異又大集經月藏分大毗婆沙有一百二十四國其梵音亦弗同耳四時衆獲益四初大衆發願時諸大衆阿修羅等聞佛所說諸災難事身毛皆竪高聲唱言願我未來不生彼國忍力未成惡國難處中人之性擇善是宜二國王出家時十六國王即捨王位修出家道楞嚴云身雖出家心不入道今砥教礪行修出家道耳具八勝處十一切處即十遍處皆如當機衆七賢中辨之得伏忍信忍無生法忍亦如前文三諸趣得法爾時一切人天大衆阿修羅等散曼陀羅華曼殊沙華前文已翻此二即天上華婆師迦華此云雨時雨時方始出生亦云夏生護華蘇曼那華色黃白亦甚香不作大樹四埀似蓋上二即人間華以供養佛隨其種性得三脫門生空法空菩提分法性有利鈍證有淺深餘文易識不須多述矣四菩薩證道二初散華獲忍無量無數菩薩摩訶薩散拘勿頭華亦云拘某他即黃色蓮華波頭摩華亦云鉢特摩即赤色蓮華而供養佛無量三昧悉皆現前得住順忍無生法忍二修定成佛無量無數菩薩摩訶薩得恆河沙諸三昧門真俗平等修諸三昧證平等理具無礙解常起大悲依智起悲於百萬億阿僧祇佛剎微塵數世界廣利衆生現身成佛三流通分囑纍品第八初來意者前明正宗當機受法正宗既陳流通將演故次來也又前之六品開濟現在此之一品傳芳末葉故次來也二釋名囑謂付囑纍即重纍付而囑之俾弘宣正法期佛種不斷也又囑此聖教國王奉持建立百座永除七難三解經四初述時付囑二初勸誡述時佛告波斯匿王今誡汝等吾滅度後金棺掩耀玉毫收彩乃示滅耳正法欲滅後五十年正法一千年將欲滅時後五十年多聞牢固時後五百年像法一千年後五百年鬬諍牢固時後五千年無佛法僧末法一萬年取後五千年三寶衰微故云無也如河少水亦得云無水耳二以經付囑此經三寶付諸國王建立守護上付外護次明內護令我四部諸弟子等受持讀誦解其義理先明自利後乃利他廣為衆生宣說法要令其修習出離生死增修熏習前諸觀門出離分段變易生死二惡主滅法二先別列文六初敘滅佛法二初立法制僧大王後五濁世俱舍論云劫滅將末壽等鄙下猶如滓穢故名五濁所謂劫濁見濁煩惱濁衆生濁命濁若釋楞嚴五濁如長水疏一切國王王子大臣自恃高貴破滅吾教明作制法制者禁也謂王言出則禁制也制我弟子比丘比丘尼不聽出家修行正道亦復不聽造佛塔像二舉喻兵奴白衣高座比丘地立與兵奴法等無有異白衣高座喻將與主比丘地立如兵事將似奴奉主若依梵網經云莫如外道癡人若老若少無前無後坐無次第兵奴之法彼略疏釋云不知禮法實為兵奴兵奴豈非癡人當知爾時法滅不久僧同兵奴則滅法之由也二誡滅國土大王破國因緣皆汝自作恃己威力制四部衆不聽修福夫修出世福莫大於三學是故戒出三塗定出六欲慧出三界捨經律論皆非真修也諸惡比丘受別請法梵網經菩薩戒本亦名請僧踰越戒故彼經云有出家菩薩在家菩薩及一切檀越請僧福田求願之時應入僧房問知事人今欲請僧求願知事報言次第請者即得十方賢聖僧而世人別請五百羅漢菩薩僧不如僧次一凡夫僧知識比丘共為一心互相親善齊會求福相知識者同心相親欺誣檀信希求福利是外道法都非我教上之二種皆非聖訓梵網亦云若別請僧者是外道法然宣律師有訃請設則篇圓頂之徒苟不披覽曷明其軋則哉百姓疾疫無量苦難當知爾時國土破滅王者不稟正教行外道法民既受苦國亦隨滅三非法繫僧大王法末世時國王大臣四部弟子各作非法出家弟子若行非法律有治罰橫與佛教作諸過咎非法非律繫縛比丘如彼獄囚非正法非戒律釋上橫與佛教如彼獄囚釋上作諸過咎當知爾時法滅不久結文可見四總顯自壞四初約喻彰壞大王我滅度後四部弟子一切國王王子通取世子百官該於州縣乃是任持護三寶者而自破滅如師子身中蟲自食師子肉非外道也蓮華面經云佛告阿難譬如師子若命終時若水若陸所有衆生不敢噉食唯師子身自生諸蟲還自噉食師子之肉阿難我之佛法非餘能壞是我法中諸惡比丘自毀壞故彼經但喻內衆今經自內及外不能持護三寶皆自壞之二約法減壽壞我法者得大過咎正法衰薄民無正行諸惡漸增其壽日減三別受三報初順現報無復孝子六親不和六親謂父母兄弟夫妻或云男女不取兄弟天龍不祐惡鬼惡龍日來侵害惡鬼為疾疫惡龍為旱潦災怪相繼為禍縱橫南北曰縱東西曰橫言其四方繼為災禍二順生報當墮地獄傍生餓鬼當墮之言貫通二塗非謂先墮地獄次受傍生後作餓鬼三順後報若得為人貧窮下賤諸根不具四總喻合法二初總喻如影隨形形正則影直業邪則報曲喻順現報也如響應聲空谷之響由聲高低喻順生報也如人夜書火滅字存火滅則無我無造無受者字存則善惡之業亦不亡喻順後報也二合法毀法果報亦復如是以喻合法故云如是此文雖近合第三亦遠合前二蓋有毀法之言耳五立籍驅役大王未來世中一切國王王子大臣與我弟子橫立記籍設官典主大小僧統非理役使佛世出家者不立記籍亦無主司僧中統攝所以不同俗役驅使也然此方有沙門統僧統之官而領緇徒如後魏皇始中趙郡沙門法果戒行精至開演法籍太祖徵為沙門統太宗崇信彌加於前永興中前後授輔國宜城子中信俟又安城公皆固讓之俗官加僧初聞於此復有罽賓沙門師賢本是王種東遊涼土復來京下守道護教魏帝詔賢為僧統僧統之官自師賢始也當知爾時佛法不久非理役使戒德罔修故佛與法住世不久六背聖從愚大王未來世中一切國王四部弟子當依十方一切諸佛常所行道建立流通十方諸佛常所行道即一門超出妙莊嚴路以此經頓漸俱收遲速皆益已悟者文字性離而持法未悟者無離文字而持義是流通之相也而惡比丘為求名利不依我法於國王前自說過患作破法緣準梵網經第六說過戒今引彼三義以消此文一用心同二對境同三立制同言用心同者賢首廣疏云為貪利養及名聞故說他過惡令名利向己等即同此文而惡比丘為求名利也言對境同者疏文又云對國王大臣說其過惡令彼捨信破壞三寶即同此文於國王前自說過患作破法緣也言立制同者而有三意一為壞信心故比丘宜弘護三寶遏惡揚善以生物信何容說過塵黷信心乖自利行故須深制之也二格量舋故謂初心菩薩豈免過失理須讚其實德成自正行而反以惡心苟求其短言陳彼過自負重𠍴故須制也三背恩德故謂由三寶及戒法被身加成勝德當獲大果宜粉骨碎身護持遺寄而今反以惡言說其罪過背恩之甚故須制也經云不依我法即彼經立制同也其王不別信受此語橫立制法不依佛戒然則果斷可否之謂智不有盛德大業辨是別非皆信受其語則背叛佛戒從愚立制自此而生也當知爾時法滅不久二總結大王未來世中國王大臣四部弟子自作破法破國因緣身自受之非佛法咎天龍捨去五濁轉增若具說者窮劫不盡三仁王依教三初諸王誡心二初聞誡悲號爾時十六大國王聞說未來如是諸誡悲啼號泣聲動三千天地昏暗光明不現二至心依教時諸王等各各至心受持佛語不制四部出家學道當如佛教二大衆悲歎爾時恆河沙等無量大衆皆共歎言當爾之時世間虗空是無佛世三約義辨名二初匿王問爾時波斯匿王白佛言世尊當何名此經我等云何奉持二如來答二初法喻雙陳佛告大王此經名為仁王護國般若波羅蜜多亦得名為甘露法藥若有服行能愈諸疾般若能斷煩惱之病其猶甘露能愈諸疾故羅什云寂滅甘露即實相法也肇公亦云大覺之道寂滅無相至味和神喻若甘露先儒又謂甘露仁澤也以王者愛養耆老則甘露降而松柏受之亦名天酒其甘如飴糖食之潤五藏長年不飢渴耳二喻德勸持大王般若波羅蜜多所有功德猶如虗空不可測量般若功德猶虗空有三因緣不可測量故無著論云一遍一切處故二寬廣高大殊勝故三無盡究竟不窮故若有受持讀誦之者所獲功德能護仁王及諸衆生猶如垣牆亦如城壁經文二喻猶如垣牆喻護衆生亦如城壁喻護仁王是故汝等應當受持四大衆奉行佛說是經已彌勒師子吼等無量菩薩摩訶薩舍利弗須菩提等無量聲聞欲界色界無量天人比丘比丘尼優婆塞優婆夷阿修羅等一切大衆聞佛所說皆大歡喜信受奉行依文殊菩薩所問經說有三種義歡喜奉行一說者清淨不為取著名利所染故二所說清淨以如實知法體故三得果清淨即說益也
