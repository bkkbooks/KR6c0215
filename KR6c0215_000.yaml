  text: 注仁王般若經科大宋沙門淨源録注仁王般若經科二初題目二初注題二述人二疏文二初通敘宗旨三初儒釋對辨三初標夫儒二釋彼以三結斯皆二正敘經旨三初標難知茲二中義二初王請安民是故二聖慈護國至聖三引例三初合辨五二敘失二初敘義昔人二顯夫中是三明得二初正明唯大二引證故有三具彰疏解二初敘昔解二初釋義有廣略若夫二流傳有隱顯然則二申今義三初明所宗淨源二報國恩庶乎三資臣德夫然二別釋經文二初題號二初解所詮四初釋仁王夫仁二釋護國護者三釋般若梵語四轉波等波羅二釋能詮三初正釋經者二敘歎然則三通妨或謂二經文二初科判三初科判源由次釋二約品分文然此三辨三之相所以二隨釋三初序分序品第一文句二初懸示三初證信序諸經二發起序二發三辨品數品者二牒釋二初證信三初建立所以二初立由然證二立意意為二科定經文雖具三依科正解二初説經時處二初釋文信成二通妨或曰二兩衆俱聞二初總敘分科二兩二隨科別釋三初明當機衆六初聲聞衆二初正釋二衆二初僧衆二尼衆二會通緣覺若按二菩薩衆二初標類舉數二敘歎行德三初總歎二別歎二初敘義二別二釋文初歎三結德三在家衆四七賢衆五國王衆六異生衆二初釋經欲界二示注昔圭二釋輔翼衆二初總敘二初指同大經二輔二明世間嚴今文二釋經四初現土宣教二初釋經土雖二引證二初引文賢首二會通論上二座現寶華三主伴齊現二初釋經文果數二會同異若準四諸佛説法三敘衆就坐二發起二正宗三流通二發起序二初敘意二發二釋經五初彰説法時二初釋經具無二通妨或謂二入定放光三諸天雨華二初別列總指華色二略示無色然無四震地警衆二初釋經震地震即二引文警衆勝思五騰疑表法六初敘昔疑今二匿王申門四初念法利生二問衆述疑三衆無答者四奏樂供佛三放光召衆四光中宣教二初別釋今經光現二會同楞嚴然今五遍集有緣三初總標二別列三結數六獻供禮敬二正宗分二初示品分科此下二依科別釋二初三品明內護二初觀如來品明護果三初來意二初釋分來來意二釋品來二品二釋名二初釋觀字二釋二釋如來具如三解經七初如來起定許説二初懸牒諸王念請二許説內護誡聽二匿王欣讚散華三詢問因果奧旨四廣答護果觀門二初化四生有情三初牒果以四生為境二修因以二行為觀二初約色蘊略明二例餘法廣辨三徵釋相如結觀心三初雙牒二雙釋三總結二示三種般若二初通示所宗二示二別釋經文二初從本起末以順釋三初實相明所觀真性三初能所相違問二空有雙照答二初約真諦明空二約俗諦明有三斥問妄分別二觀照辨能觀妙慧二初能觀所觀問二非空非有答二初略明二廣釋二初述觀料經二廣二約文申義二初真空絶相觀四初會色歸空觀三初約境明空二約智觀空三因果俱空二明空即色觀三空色無礙觀四泯絶無寄觀二理事無礙觀二初躡前示後二理二正釋經文二初明聖證十地二辨等妙二覺三文字釋詮上之教三初諸佛同宣二校量顯勝三徵釋所以二初徵二釋二初忘詮得旨勝二約法顯人勝二攝末歸本以反結三初結觀字詮觀之教二初總標三種妄見二別明詮上之教二初三有果空三初總標二別列三顯空二三界因空二經觀照能觀妙慧三初明十地空二辨等覺空三示妙覺空三結實相所觀真性五略示因人護果六問答何相觀佛二初略今淨名六問二正釋今經三初覺帝垂問二仁王申答三初總答二別答二初示教義二釋經文謂所三結答三印例斥邪七總結時衆護益二菩薩行品明護因三二諦品雙資因果二三品辨外護二菩薩行品明護因三初來意二釋名三解經二初通妨然清二釋文二初匿王請問二如來酬答二初科定經文二如二依科申義二初總答前二問六初如來闡教二初五忍法答修何行業三初總示二別釋二初指他教二別二釋今經五初伏忍二初釋經文三初下品十住明十心三初總標十住二別明觀行三初緣境發心二取信成位二初會同異楞嚴二通外難然諸三明化利益三初引論敘義二明二依論釋經論云三仰祖證成吾祖三結成功業二中品十行明十治三初總標十行二別明觀門三結成功業三上品十向明十忍三初總標十向二別明觀門三結成功業二敘所宗上來二信忍四初標位斷障二總修諸行三別指根本二初正釋經文從發二重示行本然信四現身顯益三順忍二初標位斷障二現身顯益二初釋經文億之二會影略然證四無生忍二初標位斷障二現身顯益二初釋經文七地二會隱顯然前五寂滅忍二初分科五寂二隨釋四初標位斷障二初標位分兩品二初明忍同二初正釋文此位二會同華二示品異二斷障證二覺二現身顯益二初真身二應身三辨正揀邪二初辨正二初凡迷三界三初示經文不出二申經義一切三釋諸根然二二聖化三有二初釋經報化二通妨或曰二揀邪四敘昔明果二初敘昔告衆二初釋經既斷二通妨然他二明果指本三通結二十王位答化諸衆生二初牒問二正答三初寄位度生三初略標二廣釋文有十段三總結二例諸如來三大衆供讚二匿王偈讚三時衆獲益四敘昔得果五印成歎法二初印成所説二敘歎忍法四初總標因果二別釋因果二初徵二釋二初果德境智二因行境智二初約法釋二約人釋三稱量罔及二初約境空三初諸法空二諸行空三境界空二約智空三初約法明權實二約人明申道三凡小墮有無四心言罔測三初所説益物二舉人喻説二初敘二解有謂二辨差當初解三果知因讚六勸修指同六初修顯三世同二因果一路同三標忍生信同四超罪得果同五因名果説同六大衆奉行同二別答第三問二匿王偈讚二初標説儀二初明諸頌然頌二出所以為何二正説偈二初分科敘意二正二隨文釋義三初總讚三寶二別讚五忍二初略示二廣釋五初伏忍三初兼讚十善二正讚三賢三讚信成位二初推詳文義三讚二引經略釋賢首二信忍二初敘經述宗二信二約文申義二初別讚三品三初讚下品二初釋下品謂成二釋住地智與二讚中品三讚上品二總明斷障三順忍二初別讚三品三初讚下品二讚中品三讚上品二總明斷障四無生忍三初讚下品三初正明下品二敘進中品三約行斷障二初釋偈讚中道二會長行前文二讚中品三讚上品五寂滅忍二初讚下品二初正明下品二通前斷障二讚上品四初正讚果德二揀因異果三通讚三業四別讚益物二別答第三問二初敘義分科二別二隨科別釋三初牒匿王致問二明如來正答三初略示二廣釋四初依真成妄識二隨識生染淨三約證示地位四約修辨諸假二初總明觀行四約二別釋經文八初顯法眼如幻化三初妄識生色心二色法生根大三總結皆幻法二明受假如睡夢三辨名假如聲響四相續假如陽焰五觀待假如電光六形待假如第二月七緣成假如水泡八因成假如空雲三雙結二初別結廣略二文二初結略示二結廣釋二總結自他二利三敘時衆獲益三二諦品雙資因果三初來意二初明前品初來二顯當品又如二釋名二初正釋次釋二揀非若依三解經五初匿王致問二如來正答三初實相明真俗境二初長行略示二初敘昔示義二初釋經過去二引證故華二敕聽許説二初釋當文誡令二釋互望然此二偈頌廣答二初總科偈文二偈二依科別釋三初真俗絶待二二諦互陳三初約假明二諦二約空明二諦三初法二喻三合三雙遣明中道二初法二喻二初喻真俗二喻迷悟三雙結真俗二觀照辨權實智二初總標二別釋二初分科述意二如二隨科釋義四初能所不二三初能度所度二能求所求二初略徵釋二互同釋三徵釋所以二惑智不二三絶待不二四因果不二三文字顯上二義三初匿王致問二如來正答二初通示所宗二如二別釋經義二初文字性空即實相二初文字性空二教體實相二初正明二揀非二文字性空即觀照二初躡前起後二修證觀照二初明諸佛成護果二初正明佛果二兼示九界二顯菩薩成護因二初示教道三賢緣修二明證道十聖真修三結成二護三躡前請益二初匿王申問二如來總答三初正答二徵釋二初徵二釋二初約根相異性一二約諦真一俗二二初揀非二顯是三通結四諸佛同説四初一佛例多二顯功德多二初明能説多二顯所説多三舉少況多四校量勝多二初舉一念信超苦二況四法行得樂五聞法悟道次三品辨外護二初分品大文二隨釋三初護國品正顯外護三初來意二釋名三解經四初敕聽許説二正陳護國三初明護時二示護法三初弘經置像二初釋經置佛二止濫然近二備設供儀三説聽除難三彰護益三初總明能護二別列所護二初列幽明二列依正三由教示益二初持經文二獲福袪難二初獲福二袪難三引昔護國三初引天王二引人王二初班足依邪教二初遇邪師二取千王二普明遵正法四初陳願允從二敷座請講三正説偈辭二初總敘三正二別釋二初標説人二正説偈四初演無常二宣八苦三説法空四闡無我四因偈獲益五初普明受偈益二諸王誦偈益三班足聞偈益四敘誤還國益五出家獲證益二初示位即證二示迹然班三例諸王三初例過去二例現在三例未來四聞法悟道二不思議品兼陳外護三奉持品廣前二護二不思議品兼陳外護三初來意二釋名二初相用不思議二釋二本迹不思議碧海三解經四初聞法欣躍二大衆散華三初正明散華四初華成寶座三初散華成座二佛坐説法三持華成輪二華為雲臺三初散花成臺二臺中説法三持華供佛三華作寶城二初散華作城二諸佛説法四華成雲臺二初通前述意四華二別釋經文成一二王等發願三佛即勸持三佛現神變二初總標二別列五初諸華相入二佛土相入三塵剎相入四巨細相入五凡聖相入三初明正報身二顯依報土三雙結依正四衆覩獲益二初釋經得神二通難或謂三奉持品廣前二護三初來意二初廣內護二廣外護二釋名三解經四初見佛説教三初釋本文賢首二會梵網然梵三辨見者矧匿二匿王申問三如來正答三初法師奉持三初修觀為法師二敕衆令供養三列廣賢聖位二初長行五初三賢法師二初總敘所宗三廣二別釋經文三初十住法師二初正明初賢三初總標二別列三結品二攝信成位三初總明三聚二修觀顯位三結住進行二十行法師四初總標中賢二別列十位三修觀明空四結行進向三十向法師四初總標上賢二別列十位三修觀受生四結賢進聖二初解經諸三二通妨準諸二十聖法師四初躡前起後二十二通敘所宗又此三別釋經文十初歡喜地法師四初創入聖位二證如斷障三觀智利物二初約法明權實二兼喻示權實四結位成行二離垢地法師三初證如斷障二觀智利物三結位成行三發光地法師三初證如斷障二觀智利物三結位成行四焰慧地法師三初證如斷障二觀智利物三結位成行五難勝地法師三初證如斷障二觀智利物三結位成行六現前地法師三初證如斷障二觀智利物三結位成行七遠行地法師三初證如斷障二觀智利物三結位成行八不動地法師三初證如斷障二觀智利物三結位成行九善慧地法師三初證如斷障二觀智利物三結位成行十法雲地法師四初地行入心二證如斷障三觀智利物四引皈一乘四評量翻譯然不三始終伏斷二初望果名伏二望因名斷四等妙修證三初修證明等妙二知見辨等妙三法喻顯等妙二初等覺二妙覺五雙結勸修三初結菩薩二結諸佛三總勸修二偈頌二初標舉二重頌三初總頌三賢二別頌十聖三結頌佛果二付囑奉持三説呪奉持四時衆獲益二付囑奉持五初滅度災興二初明所護二明能護二付囑所以三救護七難三初廣陳化境二略説七難二初總示二別列七初日月改變二衆星失度三諸火燒物四時序遷易五風蔽兩耀六二儀為災七四方兵起三彰能護教四匿王驚問五如來為答二初正出所因二總開能護二初以法合喻三初法二喻三合二令尊聖教三初申供儀二示出處三例人天三説呪奉持五初來福去災二敕聖護國三初總示護國二別列三立像申供三菩薩説呪三初整儀白佛二述呪功能三正説呪辭二初標舉二説呪四如來讚述五普勸受持四時衆獲益四初大衆發願二國王出家三諸趣得法四菩薩證道二初散華獲忍二修定成佛三流通分囑纍品第八文三初來意二初明分來初來二辨品來又前二釋名二初囑內護二釋二囑外護又囑三解經四初述時付囑二初勸誡述時二以經付囑二惡主滅法二初別列六初敘滅佛法二初立法制僧二舉喻兵奴二誡滅國土三非法繫僧四總顯自壞四初約喻彰壞二約法減壽三別受三報三初順現報二順生報三順後報四總喻合法二初總喻二合法五立籍驅役六背聖從愚二總結三仁王依教三初諸王誡心二初聞誡悲號二至心依教二大衆悲歎三約義辨名二初匿王問二如來答二初法喻雙陳二喻德勸持四大衆奉行二注仁王經科終
