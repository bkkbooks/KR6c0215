body:
  text: 大宋國傳賢首祖教沙門淨源撰集夫儒典之述誠明猶釋教之談寂照焉彼以聖人自誠而明類妙覺即寂而照矣賢者自明而誠比等覺即照而寂歟斯皆為教不同而同歸乎善者也矧茲聖誥雖控禦三乘而優遊中道是故仁王勤請袪七難以安民至聖垂慈敷百座而護國恢五忍則祚升覺帝其唯寂照乎歷十地則位登聖王其唯誠明乎昔人不究儒釋垂範大同而小異多以三學之文治乎心謂之域外教矣六經之訓治乎身謂之域內教矣由是寂照誠明之縕前代未融耳唯大廣智不空三藏學究二諦教傳三密通月之寂照洞中華之誠明推校詳譯獨得其奧故有唐睿文孝武皇帝御製經序載之詳矣若夫依經辨理文富義豐則良賁法師解之於前根道抵慧辭簡旨要則體元大士注之於後然則廣疏盛行於三京而其略注沉隱於二浙淨源雖無似行思坐誦托兩疏之舊章苦志勞身解三藏之新譯庶乎揚十力之妙訓報萬乘之鴻恩夫然則由誠明而護國豈唯樂熙寧於兆民抑亦資忠孝於百辟者矣仁王護國般若波羅蜜多經夫仁之為德有能仁焉有至仁焉至仁罰不仁興利除害也能仁以濟衆兼愛無私也以斯來于生民故曰王者天下之所歸往也護者加衛也國者疆域也然護之為義亦有二焉心安于道行發于教內護也城塹三寶澤及萬外護也是故經明百座之敷演諸王之奉持斯皆內外護之明效耳梵語般若此方云智慧因果合辨也在因為三慧所謂聞思修也在果成三德所謂智恩斷也由是五方菩薩說呪以加持即祕密般若也十方諸佛發言而擁護即顯了般若也波羅蜜多此譯到彼岸謂離生死塗炭此岸到涅槃富壽彼岸故經文有離七難之苦到五忍之樂焉經者以貫以攝訓法訓常謂貫穿義華攝化羣品諸佛演之而無窮百王奉之而不易然則尊崇護國之典莫若於華梵故下文云置經寶案若王行時常導其前豈非諸佛演之而無窮百王奉之而不易乎或謂智者解題折五重玄義賢首釋經闢十門妙旨今述斯文但略注經題而不開懸談者何耶答夫達節善變弘之由人至如孤山注四十二章豈有玄義碧海箋淨名奧典亦無懸談然心經略疏雖有五門總列一處今疏三章散在諸品故曰弘之由人良有謂乎次釋經文分三第一序分二正宗分三流通分以三分之興彌天高判冥符西域今古同遵然此經一部具列八品初一品序分次六品正宗後一品流通所以三者夫聖人設教必有其漸將命微言先彰由致故受之以序分由致既彰當機授法故受之以正宗正宗既陳務於開濟非但為於時會復令末葉傳芳故受之以流通今初序品第一諸經多有二序一證信序謂如是之法我從佛聞標記說處時衆同聞以為證據令物信受二發起序發明生起正宗之法或唯入定或但放光今經兼而有之品者分義類以彰名此經具有八品此品冠於群篇故稱第一然證信之立由阿難問佛令置之意為斷疑息諍及異邪故雖具六種成就今均廣略總分為二初說經時處二兩衆俱聞今初如是信成就也信則所言之理順順則師資之道成如是者感應之端也如以順機受名是以無非為稱衆生以無非為感如來以順機為應此約感應離釋如是若兼我聞合釋謂如是一部經義我昔親從佛聞我聞聞成就也我即阿難五蘊假者聞謂耳根發識領受聲塵雖因耳處廢別從總故稱我聞一時時成就也師資合會說聽究竟故言一時諸方時分延促不同故但言一佛主成就也具云佛陀此翻覺者謂覺了性相之者然具三義一自覺覺知自心本無生滅二覺他覺一切法無不是如三覺滿二覺理圓稱之為滿住王舍城鷲峯山中處成就也出化王城入止鷲峰名之曰住智論云摩伽陀王先所住城城中失火一燒一造如是至七王求住處見其五山周匝如城即造宮殿於中止住是故名王舍城也鷲峰山亦名靈鷲此山棲鷲鳥鳥實靈異故號靈鷲然處成就山城雙舉者法華論云王舍城勝餘城鷲峰山勝諸山山城俱勝表法勝故或曰清涼釋華嚴圭峯述圓覺於證信序前四成就皆約五教辨淺深諸師解同異今注斯經而杜絶其辭敢問焉對曰昔吾祖賢首啓迪梵網則廣開章門發明心經則申以略疏斯皆著述之宏規立言之懿範何者梵網張戒條則深文不得不廣心經昭灼真空則奧義不得不略今茲仁王般若既與心經同宗亦準賢首略疏若辨五教之淺深諸解之同異而比華嚴圓覺者又何異但見秦俗好武而不知魯國尚文者也二兩衆俱聞者一當機衆廣列三乘諸趣二輔翼衆略明化佛八部初當機中具列六衆初聲聞僧衆二初標類舉數與大比丘衆千八百人俱與者并也共也大者名高德著比丘梵語此含三義一怖魔二乞士二破惡衆者理和事和俱者一時一處二敘歎行德三初總指皆阿羅漢諸漏已盡無復煩惱阿羅漢此翻為應應已永害煩惱賊故應受人天妙供養故應不受分段生故此果住三義由輔比丘因行三義如次對之漏有三種皆已斷盡種現煩惱更不再生故云無復二別歎心善解脫慧善解脫分別已亡得心解脫俱生永除得慧解脫亦同大乘斷煩惱障得心解脫斷所知障得慧解脫皆約斷粗細二種惑以明心慧二解脫舊解謂羅漢有利根者名心解脫鈍根者名慧解脫九智十智所作已辦九智斷分別之粗十智斷俱生之細二惑既亡故所作已辦九智即世俗智法智類智苦智集智滅智道智他心智盡智耳十智即後無生智舊解謂鈍根無學有前九智利根羅漢具後無生智三假實觀法假實觀受假實觀名假實觀假即世俗境實即勝義境觀之一字即能照智依大般若亦通大乘故智論云應化聲聞實是菩薩三空門觀空觀無相觀無作觀即俱舍論三解脫門三結德有為功德無為功德皆悉成就無間道修有為也解脫道證無為也所施曰功皈已為德故云成就二尼衆復有比丘尼衆八百人俱皆阿羅漢尼女聲也若按羅什所譯之本即有緣覺衆故彼經云復有八百萬大仙緣覺非斷非常四諦十二緣皆悉成就今不空重譯但列聲聞即攝緣覺由其理果同故例如約人辨二藏唯出聲聞藏耳二菩薩衆二初舉數標類復有無量無數菩薩摩訶薩釋菩薩義具如下文梵語摩訶此方云大皆地上大士耳二敘歎行德三初總歎實智平等永斷惑障方便善巧起大行願實智有窮幽之鑒了惑障而本空權智有應會之用起行願而涉有此亦般若之門觀空則實智平等也漚和之門涉有則方便善巧矣二別歎然今經說十地具有六段一菩薩衆密歎十地二五忍位合辨十地三十王位各對十地四匿王偈雙讚十地五法師位斷證十地六佛說偈重頌十地今釋密歎十地更不引他經論但取當經五處文義或長行或偈頌與此符合者以注之夫然則非但疏是經文乳非城內亦見六篇更資而科義有準焉又若所引長行偈頌其間有三明五通四辨十力至下本文具釋無煩預云以四攝法饒益有情初歡喜地下偈云由初得覺悟名為歡喜地長行云行四攝法布施愛語利行同事善能安住饒益衆生四無量心普覆一切二離垢地下偈云具戒清淨德名為離垢地長行云修四無量慈無量心悲無量心喜無量心捨無量心三明鑑達得五神通三發光地下偈云善能通達三摩地隱顯自在具三明長行云具足勝定得五神通修習無邊菩提分法四𦦨慧地下偈云清淨菩提分遠離身見智長行云行菩提分法教化一切衆生工巧技藝超諸世間五難勝地下偈云世間諸技藝種種利羣生長行云文字醫方工巧呪術深入緣生空無相願六現前地下偈云現前菩薩自在王照見緣生相無二長行云得上順忍住三脫門出入滅定示現難量七遠行地下偈云方便三摩地示現無量身長行云住於滅定起殊勝行雖常寂滅廣化衆生摧伏魔怨雙照二諦八不動地下偈云自在破魔軍名為不動地長行云雙照平等化諸衆生法眼普見知衆生根四無礙解演說無畏九善慧地下偈云得四無礙解一音演一切長行云以四無礙智化一切衆生十方妙智雷震法音近無等等金剛三昧十法雲地下偈云普灑甘露法名為法雲地長行云金剛三昧現在前時而亦未能等無等等三結德如是功德皆悉具足始從歡喜終至法雲皆以修度為功證理名德三在家衆復有無量優婆塞優婆夷衆皆是聖諦優婆塞優婆夷此云近事男近事女由具五戒堪可親近承事大僧尼故言皆見聖諦名謂初果聖人以其淨慧照四諦境斷見道惑即見聖諦具如佛地論四七賢衆復有無量修七賢行一五停心觀二別相念住三總相念住四𤏙善根五頂善根六忍善根七世第一善根此七法行鄰近聖位故總名賢念處正勤神足根力四念處四正勤四神足五根五力此二十二品有漏位修故屬七賢若七覺支八正道餘一十五品屬無漏位聖人故經無文八勝處一內有色想觀外色少二內有色想觀外色多三內無色想觀外色少四內無色想觀外色多五觀青六觀黃七觀赤八觀白能制伏境心勝境處故名勝處十遍處謂周遍觀地水火風青黃赤白及以空識二無邊處周遍觀察無有間隟故名遍處十六心行修四聖諦於一一諦有四行相故成十六心即能緣行相行緣能所合說名為心行趣諦現觀趣謂能趣即十六所諦現觀者是所趣故辨其觀義如俱舍論五國王衆復有十六大國王波斯匿王等各與若干千萬眷屬俱波斯匿此方云和悅楞嚴疏翻云勝君獨標匿王者謂發起上首也若干者設數之辭也十六國名下經具列六異生衆復有六欲天王釋提桓因等與其眷屬無量天子俱欲界六天一四王二忉利三𦦨摩四兜率五化樂六他化梵語釋提桓因此方云能天帝即忉利天王三十三天帝主也色四靜慮諸大梵王亦與眷屬無量天子俱色界四禪天靜揀散心慮揀無慧止觀均故此界竪論十八天皆有梵王為主諸天之名備如華嚴諸趣變化無量有情阿修羅等若干眷屬俱此八部有情皆承宿因得變化通有其五種亦如俱舍阿修羅等者等取迦樓羅緊那羅摩睺羅伽夜叉王龍王鳩槃荼乾闥婆此八部衆常隨佛故昔圭峯祖師發揮金剛蘭盆合而辨之則先列經文後申疏義若夫開拓圓覺起信離而釋之或別解一字或總注數行蓋經旨有隱顯而節文有合離矣故今所述亦離而注之吾從古也二輔翼衆然今經證信序有輔翼衆亦同華嚴序分輔翼不空三世間嚴耳彼疏云衆即淨土輔翼不空以其菩薩有輔翼圓滿而言不空者即眷屬圓滿是皆寄穢土以顯淨故今文亦具三世間嚴經謂復有變現十方淨土即器世間嚴其中諸佛宣說般若即智正覺世間嚴無量菩薩四衆八部即衆生世間嚴若天融三世間而為十身具如華嚴大疏文有四段初現土宣教復有變現十方淨土土雖多種不出其三一法性土二受用土三變化土若開受用有自有他則成四土經云變現者非第三變化土通取變現他受用報化色相功德耳而現百億師子之座人中師子處之又說無畏之法故得法空者何所畏哉佛坐其上廣宣法要他受用身為地上大士說一味之經若就機宜亦現化身為地前菩薩說三賢法門賢首梵網疏引攝論云隨他受用身為地上菩薩於淨土中現身說法為地前機現化身佛斯皆明文有據矣論上句云於淨土中即此經復有變現十方淨土下句云現身說法即此經佛坐其上廣宣法要然以論通經祖師遺訓次第對之如指諸掌二座現寶華一一座前各現一華表行布行如十地菩薩各修一度是百億華衆寶嚴飾表圓融行如一地之中各具諸地功德三主伴齊現於諸華上一一復有無量化佛無量菩薩四衆八部悉皆無量果數因數悉皆無量者表修因行無量證果德亦無量也而其主伴皆在諸華之上者表因該果海果徹因源若準華嚴主在華臺伴在華鬚故彼疏云正助不等臺鬚有差其故何耶蓋彼經明因主即勝音菩薩因伴即世界海微塵數菩薩今經明果主即無量化佛因伴即同生異生二衆其僧尼士女四衆大分亦異生耳然二經表法悉具微旨可以虗求勿厭繁文四諸佛說法其中諸佛各各宣說般若波羅蜜多展轉流遍十方恆沙諸佛國土其中諸佛牒前化佛三敘衆就坐有如是等諸來大衆各禮佛足退坐一面此一唱經總結二衆若唯結輔翼而不該當機者此得於近而失乎遠矣二發起序然金光明經唯顯入定法華妙典但明放光豈若今經先入禪定續放光明以體資用發起般若正宗文有五段初彰說法時爾時世尊具無量德為世所尊初年月八日即說般若之初年正月八日所以清涼引真諦三藏云七年前說四諦名轉法輪七年後說般若具轉照二輪以空照有故既言七年後說般若即當第八年之初耳或謂據下文說八部般若在初此經居後其旨何哉答夫教有本迹時有後先語其本則一音頓演隨類各解言其迹是八部初說此經後陳儻能達本而忘迹同一音之妙唱不執時之先後者則般若玄旨庶幾乎有在焉二入定放光入大寂靜妙三摩地心與境冥曰入言思道斷曰妙大寂靜語至定也三摩地翻云慧也即寂照雙流耳若依楞嚴疏三摩提此云觀約因行以翻身諸毛孔放大光明普照十方恆沙佛土身毛即正報佛土即依報入定既寂照雙流放光乃依正交徹三諸天雨華是時欲界無量諸天雨衆妙華華色非一曰衆遍悅羣機曰妙色界諸天亦雨天華衆色間錯甚可愛樂分枝埀布衆色交映故云間錯華品殊絶靜觀無厭故稱愛樂時無色界雨諸香華依定發通香華彌布上雙標下雙釋香如須彌華如車輪氛氳騰起妙而且高故如須彌芳菲在空旋而復轉故如車輪然欲界諸天但雨妙華色界天華間錯可樂無色界天香華併下此亦界地升降不同致使香華有異上別列下總指如雲而下遍覆大衆然無色有情雖無業果色而有定果色是故雨香似山散華如輪四震地警衆普佛世界六種震動震即是聲動即是形聲兼吼擊兼形起涌故有六種此六各三成十八相具如華嚴經疏勝思惟梵天經中說有七因一令諸魔生驚怖故二令時衆心不散故三令放逸者生覺悟故四令衆生念法相故五令衆生觀說處故六令成熟者得解脫故七令隨順問正義故五騰疑表法六初敘昔疑今爾時大衆自相謂言大覺世尊前已為我等說摩訶般若波羅蜜多金剛般若波羅蜜多天王問般若波羅蜜多大品等無量無數般若波羅蜜多般若具有八部經文但列其三故有等言謂等取小品道行放光光讚文殊問也今日如來放大光明斯作何事二匿王申問四初念法利生時室羅筏國波斯匿王作是思惟今佛現是希有之相必雨法雨普皆利益室羅筏此翻豐德謂具足財寶欲塵多聞解脫等即印度憍薩羅國都城之名準西域記有南北二憍薩羅國揀異南國故城國雙舉也二問衆述疑即問寶蓋無垢稱等諸優婆塞在家衆也寶積長者持蓋奉佛故立斯號無垢稱即淨名居士含利弗須菩提等諸大聲聞小乘衆也舍利弗此方云鶖子須菩提此云善現彌勒師子吼等諸菩薩摩訶薩大乘衆也彌勒此云慈氏師子吼即處衆說法得大無畏上問衆下述疑言如來所現是何瑞相匿王法身大士既覩現瑞知必宣揚八品極唱由茲發起三衆無答者時諸大衆無能答者佛智幽深因人罔測表其所說必造玄微四奏樂供佛波斯匿王等承佛神力廣作音樂欲色諸天各奏無量天諸技樂聲遍三千大千世界詢問無答不可徒然奏樂供佛以俟法音三放光召衆爾時世尊復放無量阿僧祇光其明雜色前放光明不言其數表根本智證理今此放光而言無量雜色者表後得智說法度人四光中宣教一一光中現寶蓮華其華千葉皆作金色上有化佛宣說法要光現蓮華皆作金色表自性無染佛說法要含果法故又光現蓮華表行法皆作金色表理法上有化佛表果法宣說法要表教法然今經光中宣教與楞嚴放光說呪觀其文則小異究其旨則大同何者彼經謂于時世尊頂放百寶無畏光明即同此文爾時世尊復放無量阿僧祇光也彼云光中出生千葉寶蓮即此一一光中現寶蓮華其華千葉也彼云有佛化身結加趺坐宣說神呪即此上有化佛宣說法要也而又所表法門皆在發起序中夫然則二經妙唱雖有後先統其要旨誠謂殊塗而同歸者也五遍集有緣三初總標是佛光明普於十方恆河沙等諸佛國土有緣斯現即感應道交不失良機矣二別列彼他方佛國中東方普光菩薩摩訶薩放光遍照不擇怨親東南方蓮華手菩薩摩訶薩衆行無染普接羣機南方離憂菩薩摩訶薩障無不盡稱真離憂西南方光明菩薩摩訶薩智光內照身光外明西方行慧菩薩摩訶薩所行萬行以慧為光西北方寶勝菩薩摩訶薩智寶嚴心勝諸凡小北方勝受菩薩摩訶薩勝德已備受法王位東北方離塵菩薩摩訶薩智證真如離諸塵障上方喜受菩薩摩訶薩以教導物喜而受之下方蓮華勝菩薩摩訶薩自性無染勝諸芳英各與無量百千俱胝菩薩摩訶薩皆來至此俱胝者唐三藏譯為千萬六獻供禮敬持種種香散種種華作無量音樂供養如來頂禮佛足默然退坐默然者即是願樂欲聞十地經云如渴思冷水如飢念美食如病憶良藥如蜂貪好蜜我等亦如是願聞甘露法合掌恭敬一心觀佛前證信序但言各禮佛足退坐一面今發起序復云合掌恭敬一心觀佛者謂發起正宗有其二義一者品題即觀如來品是也二者經文即觀身實相觀佛亦然此下六品明正宗分初三品明內護後三品明外護今初護果略啓三門觀如來品第二來意有二先分來後品來今初三分之中自下正宗由致既彰正宗宜顯故次來也二品來者曲有二義一前辨衆集今顯教主二先為因人備陳果護故次來也二釋名者妙慧為能觀如來為所觀能所雙標以立其稱且如來一號有其五義一就理顯謂法性名如出障名來二唯就行瑜伽云言無虗妄故名如來三理智合說轉法輪論云第一諦名如正覺名來四離相說般若云無所從來亦無所去故名如來五融通說謂一如無二如若理若智若開若合無不皆如故名如來如外無法來亦即如如是來者是真如來三解經於中有七初如來起定許說二初懸牒諸王念請爾時衆已集時世尊從三昧起梵語三昧此翻等持坐師子座告大衆言吾知十六諸國王等咸作是念世尊大慈普皆利樂我等諸王云何護國實智內照權智外明故知諸王念請護國二許說內護誡聽善男子順理剛斷之稱吾今先為諸菩薩摩訶薩說護佛果護十地行王請護國而先為說護因果者此有二意一謂欲令佛種不斷則莫若善付囑故先為菩薩也二謂若無內護因果則外難無由悉滅矣汝等皆應諦聽諦聽善思念之誡令審諦無以生滅心行聽實相法以諦聽即聞慧善思即思慧念之即修慧若具三慧為因必證五忍之果二匿王欣讚散華是時大衆波斯匿王等聞佛語已咸共讚言善哉善哉重言善哉者智論云善之至也以因果二護諸佛法要內隆三寶外袪七難既蒙許說利樂實多大衆欣躍故重讚之即散無量諸妙寶華於虗空中變成寶蓋覆諸大衆靡不周遍若表法門於虗空中變成寶蓋即動用於一虗之中覆諸大衆靡不周遍即寂寥於萬化之域三詢問因果奧旨時波斯匿王即從座起頂禮佛足合掌長跪而白佛言世尊菩薩摩訶薩云何護佛果云何護十地行從座而起者謂請業則起更端則起今問二護即更端也四廣答護果觀門二初化四生有情三初牒果以四生為境佛告波斯匿王言護佛果者諸菩薩摩訶薩應如是住實智照真不住有權智達俗不住空權實無礙成無住行教化一切卵生胎生濕生化生教化一切四生有悲也實無四生可化者有智也釋四生義有受生依止境界三種差別如華嚴金剛二疏二修因以二行為觀二初約色蘊略明不觀色相不觀色如以有智故了色即真空不觀色相也以有悲故達色是幻有不觀色如也二例餘法廣辨受想行識我人知見常樂淨倒先例餘四蘊後明四倒然我倒言人知見者謂依蘊妄執故有人執妄知妄見若以觀門例前以釋即悲而智不觀受相即智而悲不觀受如餘七倣此上例染境下例淨境四攝六度二諦四諦亦以悲智二行不觀相與如力無畏等一切諸行十力四無畏又等十八不共法一切行即因中萬行乃至菩薩如來亦復如是不觀相不觀如始自受想終至如來皆以悲智二行不觀相如故總例云亦復如是三徵釋相如結觀心三初雙徵所以者何所以不觀相如者何耶二雙釋以諸法性即真實故由諸法性即真空實體故無來無去無生無滅體絶迷悟故無去來性非染淨故無生滅同真際等法性無二無別猶如虗空一如無二如故云無別虗空有二義一周遍義同真實際二含容義等諸法性上釋有悲不觀如下釋有智不觀相蘊處界相無我我所歷推三科非但無我亦無我所第三總結是為菩薩摩訶薩修行般若波羅蜜多二示三種般若賢首國師云一實相謂所觀真性二觀照謂能觀妙慧三文字謂詮上之教今準此科經潛申宗趣耳文二初從本起末以順釋三初實相明所觀真性三初能所相違問波斯匿王白佛言世尊若菩薩衆生性無二者菩薩以何相而化衆生耶問意謂能化菩薩所化四生性既無二則用何化相而化衆生乎然經文謂若菩薩衆生性無二者即躡前不觀色相不觀色如以何相而化衆生即躡前應如是住教化四生二空有雙照答二初約真諦明空佛言大王色受想行識常樂我淨法性總明五蘊四倒皆以法性為本已辨所觀次釋能觀不住色不住非色受想行識上二句不住色不住非色貫下四蘊不住受不住非受餘三倣此常樂我淨亦不住淨不住非淨下二句不住淨不住非淨蒙上三倒不住常不住非常餘二亦然何以故徵意謂以何義故悉皆不住耶下釋云以諸法性悉皆空故謂五蘊四倒自性皆空也二約俗諦明有由世諦故上句總標下皆別列由三假故法受名三一切有情蘊處界法五蘊十二處十八界造福非福不動行等造福人天善業非福四趣惡業不動行等即四禪四空也然大般若明福業非福業不動業其文雖廣與此大同因果皆有通明三界惡因苦果善因樂果皆名為有上明六凡下辨四聖三乘賢聖所修諸行大乘三賢十聖小乘七賢四聖乃至佛果皆名為有次下別明外道六十二見亦名為有計我是色許我異色我在色中色在我中乃至識亦如是一陰計四四五二十過未斷常成六十二三斥問妄分別大王若著名相分別諸法六趣四生三乘行果即是不見諸法實性若分別二乘四生為所度菩薩佛果為能度即不見實相真性也二觀照辨能觀妙慧二初能觀所觀問波斯匿王白佛言諸法實性清淨平等非有非無智云何照問意謂所觀之境即非有非無能觀之智如何雙照耶二非空非有答二初略明佛言大王智照實性非有非無以中道之妙智照實相之真性不執常非有也不著斷非無也上正答下徵釋所以者何以何義故非有無耶法性空故以諸法性即第一義空二廣釋昔賢首以圓融三觀通般若心經而判屬實教今推斯文以一念妙慧之因證諸地分滿之果乃屬一乘同教故準祖師觀門以科經旨文二初真空絶相觀二理事無礙觀初中有四初會色歸空觀三初約境明空是即色受想行識十二處十八界士夫六界地水火風空識是名六界上明六凡下明四聖十二因緣二諦四諦一切皆空二諦即中道菩薩分證如來極證上正明境空下會生滅空是諸法等即生即滅即有即空當處出生即有也隨處滅盡即空也剎那剎那亦復如是每一剎那皆具空有生滅故云亦復如是上總明下徵釋云何以故一念中有九十剎那一剎那經九百生滅從微至著顯微細生滅非凡夫妄心之所識非小乘淺智之所知下通結云諸有為法悉皆空故諸法若不空則無道無果二約智觀空以甚深般若波羅蜜多照見諸法一切皆空謂以法空般若照諸法自性皆空即二空理深慧所見也上總明下別列內空外空內空即六根外空即六境內外空內根外境共生六識亦空空空了十八界空此空亦空大空勝義空大空即等空不動智能證空也勝義空即中道無相理所證空也等空即十方空有為空無為空有為生死空無為涅槃空無始空畢竟空散空過去無始空未來畢竟空現在無住名為散空本性空自相空本性真諦空自相俗諦空一切法空始自六根終乎二諦由諸法相待皆屬緣生故結一切皆空也三因果俱空般若波羅蜜多空因空佛果空能證般若既空修因證果俱空空空故空所空諸法既空能空之智亦空二明空即色觀諸有為法世出世間有為法也上總標下別列法集故有受集故有名集故有三假也緣聚而成故名為集因集故有果集故有四諦也世出世間因果皆有六趣故有十地故有佛果故有一切皆有六趣輪回皆凡夫十地佛果皆聖人并前二乘四諦則十法界一切皆有三空色無礙觀善男子若菩薩住於法相有我相人相有情知見為住世間即非菩薩謂此菩薩不了色相舉體是空故住世間所以者何一切諸法悉皆空故以色是幻色不礙真空故終南觀云是故菩薩看色無不見空也四泯絶無寄觀若於諸法而得不動以生心動念即乖法體故不生不滅即空故不生不即空故不滅無相無無相即幻色故無相不即幻色故無無相不應起見非解所見是謂行境何以故一切法皆如也諸佛法僧亦如也法法皆如即理法界於茲顯矣二理事無礙觀前文會色歸空明空即色皆揀情顯解空色無礙解終趣行泯絶無寄正成行體雖有四門方為真如之理今此理事無礙觀觀事當俗觀理當真令觀無礙即顯真如之妙用文二初明聖證十地聖智現前最初一念具足八萬四千波羅蜜多名歡喜地據下經文明十四忍初地菩薩行檀波羅蜜今最初一念具足八萬四千者謂菩薩妙行有其二種一行布二圓融行布是教相施設圓融是理性德用行布不礙圓融故最初一念具足八萬四千圓融不礙行布故初地聖人行檀波羅蜜賢劫經中但辨行布唯此經與華嚴具二無礙故彼經初地云一地之中具攝一切諸地功德以此證之則今經屬一乘同教其言不誣矣障盡解脫上明初地此辨餘九謂地地之中皆斷一障二愚即證解脫果運載名乘謂運重載遠即是大乘梁攝論亦云來大性故名為大乘二辨等妙二覺動相滅時名金剛定動相即無明也下經云觀勝義諦斷無明相是為等覺亦以金剛喻定耳體相平等名一切智智以根本智照體後得智觀相體相境不二根後智不殊即寂而照其唯妙覺歟三文字釋詮上之教三初諸佛同宣大王此般若波羅蜜多文字章句句詮差別章者解句百佛千佛百千萬億一切諸佛而共同說諸佛道同所說不異下菩薩行品大衆亦見恆沙諸佛說十四忍如我世尊所說無異二校量顯勝若有人於恆河沙三千大千世界俱舍偈云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千陪說名一中千此千陪大千皆同一成壞滿中七寶金銀琉璃珊瑚碼瑙赤真珠頗黎以用布施大千世界一切有情皆得阿羅漢果上校量下顯勝不如有人於此經中乃至起於一念淨信金剛云信心清淨則生實相故超羅漢自利偏真也何況有能受持讀誦解一句者信力故受念力故持對文曰讀離文曰誦解一句者非非句也二徵釋所以二初徵所以有何一念淨信所以勝者何耶二釋二初忘詮得旨勝文字性離無文字相淨名云文字性離無有文字是則解脫非法非非法天親論云非法者一切法無體相故非非法者彼真如無我實相有故二約法顯人勝般若空故菩薩亦空上句法下句人次徵釋云何以故於十地中地地皆有始生住生及以終生此三十生悉皆是空以歡喜地最初見道名為始生於初地中具修勝行名為住生初地將滿進求後地名為終生餘九例此即成三十亦是地地中入住出三心也上明因空下例果空一切智智亦復皆空一切智根本智下智字後得智二攝末歸本以反結三先結文字詮上之教二初總標二種妄見大王若菩薩見境見智見說見受即非聖見是愚夫見見實相之境觀照之智文字說受非聖智真見乃凡愚妄見也二別明詮上之教二初三有果空三初總標有情果報三界虗妄六趣輪回即有情世間正報也三界虗妄即器世間依報也然虗妄之言總該四惡趣及四洲等故楞嚴云此等亦皆自虗妄業之所招引二別列欲界分別所造諸業欲界六天諸識分別所造諸業即修上品十善及施戒等分別謂心跡也楞嚴又謂如是六天形雖出動心跡尚交色四靜慮定所作業色界四禪天定慧雙修為所作業靜定也慮慧也定慧均平方稱靜慮楞嚴亦云不假禪那無有智慧無色四空定所起業無色界四空天定果色起業果色滅楞嚴又謂是四空天身心滅盡定性現前無業果色三顯空三有業果一切皆空四趣惡業果人天善業果上界禪定果二三界因空三界根本無明亦空三界有情皆以無明而為根本故俱舍頌云無明諸有本前業果既空今惑因亦空二結觀照能觀妙慧三初明十地空聖位諸地無漏生滅地上菩薩分得無漏之智證無生滅之理上通辨十地下別明七八於三界中餘無明習七遠行地斷餘無明習氣故下偈云順道法愛無明習遠行菩薩獨能斷變易果報亦復皆空八不動地受變易果報行純熟如下偈云不動菩薩二禪王得變易身常自在二辨等覺空等覺菩薩得金剛定二死因果空一切智亦空分段變易二種生死為果由其煩惱所知二障為因所斷因果既空則能斷一切智亦空也三示妙覺空佛無上覺種智圓滿擇非擇滅以慧揀擇斷無明惑佛果無斷故非擇滅起信云無明頓盡名一切種智上顯涅槃斷果次明菩提智果真淨法界性相平等應用亦空性相不二本唯一真依真起應用化羣生羣生本如應用皆空也三結實相所觀真性善男子若有修習般若波羅蜜多躡前觀照說者聽者譬如幻士即真而俗有說有聽無說無聽法同法性猶如虗空即俗而真無說無聞一切法皆如也真俗不二唯一實相世出世法皆如也五略示因人護果大王菩薩摩訶薩護佛果為若此由其內護佛果則能外護國土內外更資皆由般若其德如是六問答何相觀佛夫能對揚妙訓隱顯其迹皆法身大士今經與夫淨名總相問答文勢全同故以匿王例維摩詰唯別答中大同小異抑又彼廣此略耳文三初覺帝埀問爾時世尊告波斯匿王言汝以何相而觀如來全同彼經問維摩詰云汝欲見如來為以何等觀如來乎羅什釋曰若自有慧眼則能玄照不能觀形若無慧眼則對形而隔故問其所以何等觀如來二仁王申答三初總答波斯匿王言觀身實相觀佛亦然即同維摩詰言如自觀身實相觀佛亦然肇公釋云佛者何也蓋窮理盡性大覺之稱也其道虗玄固以妙絶常境心不可以智知形不可以像測同萬物之為而居不為之域處言數之內而止無言之鄉故經曰見實相法為見佛也二別答然淨名經別答中羅什三藏生肇二師各申義解今依本宗正解深文而獨取肇師兼明奧旨若夫以教收經如下文謂不住三際不離三際等皆終教收非施非慳等皆頓教攝亦準演義鈔文科判耳無前際無後際無中際謂所觀實相不從前際來非向後際去不於現在住是則三際泯絶一念斯忘矣不住三際不離三際三際求心心不有不住也三世悉在無有餘不離也是則時無別體故不住念劫圓融故不離不住五蘊不離五蘊實色非真空故不住真空即幻色故不離不住四大不離四大地水火風緣生而有不住也清淨本然周遍法界不離也不住六處不離六處見聞如幻翳三界若空華不住六處也於諸如來常了了分明見不離六處也不住三界不離三界實相淨而娑婆穢不住三界也而穢國與實相融通故不離三界也不住方不離方法身無在而無不在無在故不住方無不在故不離方明無明等實相無相體順三明雖有三明而不異無明也非一非異無像不像故非一像而無像故非異非此非彼非淨非穢處生死而非此岸非穢國居涅槃而非彼岸非淨非有為非無為欲言有為無相無名欲言無為備應萬形無自相無他相冥穢潛應無自相攝應會真無他相無名無相不可以名名不可以相相無強無弱無示無說理絶上智無強無說也事泯下愚無弱無示也非施非慳非戒非犯非忍非恚非進非怠非定非亂非智非愚真性具德非六度之所修妙慧圓通非六蔽之能障非來非去非入非出物感而顯非王宮出來感畢而隱非雙樹入去非福田非不福田無心應物非福田也有求皆益非不福田非相非無相非取非捨非相故不可以有心取非無相故不可以無念捨非大非小非見非聞非覺非知非小故展之遍法界非凡夫眼見耳聞也非大故卷之入一塵非二乘身覺智知也三結答心行處滅言語道斷同真際等法性心行處滅不可以心思也言語道斷即等法性不可以口議也我以此相而觀如來我以實相而觀法身如來故前文云觀身實相觀佛亦然三印例斥邪佛言善男子如汝所說諸佛如來力無畏等恆沙功德諸不共法悉皆如是如汝所說觀佛實相離於諸非而諸佛力無畏等離非亦然故云悉皆如是言恆沙功德諸不共法即如來一百四十不共功德上印例下斥邪修般若波羅蜜多者應如是觀以觀照妙慧冥實相真性若他觀者名為邪觀除實相外餘皆魔事故名邪觀七總結時衆獲益說是法時無量大衆得法眼淨覆推此文近結第六遠結前五原始要終通結一品得法眼淨者亦同楞嚴聞說圓通遠塵離垢得法眼淨即初地見道位也然肇法師釋淨名經得法眼淨即須陀洹道者彼約佛現國土嚴淨諸天及人知有為法悉是無常得小乘益方今大教其猶螢光與杲日爭輝耳
